<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Rotation | Rajesh's Stock Screener</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04091a;
            --card: #0a1120;
            --border: #1e293b;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #00e5ff;
            --leading: #22c55e;
            --improving: #60a5fa;
            --weakening: #f59e0b;
            --lagging: #ef4444;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; }
        .title-group h1 { margin: 0; font-size: 22px; font-weight: 900; }
        .title-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .version { font-size: 10px; color: var(--accent); letter-spacing: 0.15em; font-weight: 700; }

        /* Slider Styles */
        .controls { display: flex; align-items: center; gap: 15px; background: rgba(30, 41, 59, 0.4); padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border); }
        .slider-label { font-size: 11px; font-weight: 700; color: var(--text-dim); }
        input[type="range"] { -webkit-appearance: none; width: 120px; background: #1e293b; height: 4px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--accent); }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .chart-container { position: relative; background: #070e1d; }
        
        /* Ticker Banner */
        .banner { height: 32px; background: #040a14; border-bottom: 1px solid var(--border); display: flex; align-items: center; overflow: hidden; position: relative; }
        .banner-scroll { display: flex; white-space: nowrap; animation: scroll 50s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .banner-item { padding-right: 30px; font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 700; }

        /* Panels */
        .panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .mini-card { background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
        .mini-title { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
        .signal-item { display: flex; align-items: center; gap: 8px; font-size: 11px; margin-bottom: 5px; cursor: pointer; }
        .signal-ticker { font-weight: 800; min-width: 35px; }

        /* Spotlight */
        .spotlight { margin: 15px; padding: 15px; background: rgba(0, 229, 255, 0.03); border: 1px dashed rgba(0, 229, 255, 0.2); border-radius: 12px; }
        
        #loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 15px; }
        .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div class="version">INITIALIZING NEURAL RADAR v2.9...</div>
    </div>

    <div class="container">
        <div class="header">
            <div class="title-group">
                <div class="title-meta">
                    <div class="dot"></div>
                    <div class="version">ABSOLUTE ZERO ENGINE v2.9 PRO</div>
                </div>
                <h1>Stock Rotation</h1>
            </div>
            <div class="controls">
                <div class="slider-label">MIN RS</div>
                <input type="range" id="rsSlider" min="0" max="99" value="80">
                <div id="rsVal" style="font-size: 11px; font-weight: 900; color: var(--accent); min-width: 20px;">80</div>
            </div>
        </div>

        <div class="card">
            <div class="banner" id="tickerBanner"></div>
            <div class="chart-container" id="chartContainer">
                <svg id="rrgSvg" width="100%" height="100%"></svg>
            </div>
            <div class="panel-row">
                <div class="mini-card" id="velocityPanel"></div>
                <div class="mini-card" id="vortexPanel"></div>
            </div>
            <div class="spotlight" id="spotlightContent"></div>
        </div>
    </div>

    <script>
        const Q_COLORS = { leading: '#22c55e', improving: '#60a5fa', weakening: '#f59e0b', lagging: '#ef4444' };
        let allData = [];
        let history = {};
        
        // Configuration
        const CW = 600, CH = 480, P = 50;

        async function init() {
            try {
                const ts = Date.now();
                const [resD, resH] = await Promise.all([
                    fetch(`web_data.json?v=${ts}`),
                    fetch(`stock_history.json?v=${ts}`)
                ]);
                const webData = await resD.json();
                history = await resH.json();
                allData = webData.all_stocks || webData.stocks || [];
                
                document.getElementById('loading').style.display = 'none';
                
                const slider = document.getElementById('rsSlider');
                slider.addEventListener('input', (e) => {
                    document.getElementById('rsVal').textContent = e.target.value;
                    render();
                });

                render();
            } catch (e) {
                console.error("Critical Engine Error:", e);
                document.getElementById('loading').innerHTML = `<div class='version'>FATAL BOOT ERROR</div><div style='font-size:10px;color:#ef4444'>${e.message}</div>`;
            }
        }

        function getMedian(arr) {
            if (arr.length === 0) return 0;
            const sorted = [...arr].sort((a,b) => a-b);
            const mid = Math.floor(sorted.length / 2);
            return sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid-1] + sorted[mid]) / 2;
        }

        function render() {
            const minRS = parseInt(document.getElementById('rsSlider').value);
            
            // 1. Process Data
            let filtered = allData.filter(s => s.rs >= minRS).slice(0, 30);
            
            const processed = filtered.map(s => {
                const h = history[s.ticker] || [];
                const curRS = h[0] !== undefined ? h[0] : s.rs;
                const path = [];
                for(let i=0; i<10; i++) {
                    const r = h[i], r_prev = h[i+7];
                    if (r !== undefined && r_prev !== undefined) {
                        path.push({ x: r, y: r - r_prev });
                    }
                }
                const mom = path[0] ? path[0].y : 0;
                return { ...s, rs: curRS, mom, path };
            });

            // 2. Relative Centering Fix
            const RS_MID = getMedian(processed.map(s => s.rs)) || 85;
            const MOM_MID = getMedian(processed.map(s => s.mom)) || 0;

            const RS_MIN = 30, RS_MAX = 100;
            const M_MIN = -12, M_MAX = 12;

            const px = v => P + ((Math.max(RS_MIN, Math.min(RS_MAX, v)) - RS_MIN) / (RS_MAX-RS_MIN)) * (CW - P*2);
            const py = v => (CH - P) - ((Math.max(M_MIN, Math.min(M_MAX, v)) - M_MIN) / (M_MAX-M_MIN)) * (CH - P*2);
            
            const MX = px(RS_MID), MY = py(MOM_MID);

            // 4. Draw SVG
            const svg = document.getElementById('rrgSvg');
            svg.setAttribute('viewBox', `0 0 ${CW} ${CH}`);
            
            let html = `
                <defs>
                    <radialGradient id="nodeGlow"><stop offset="0%" stop-color="#fff" stop-opacity="0.8"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></radialGradient>
                    <filter id="glow"><feGaussianBlur stdDeviation="2" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                </defs>

                <rect x="${P}" y="${P}" width="${MX-P}" height="${MY-P}" fill="rgba(96,165,250,0.06)" />
                <rect x="${MX}" y="${P}" width="${CW-P-MX}" height="${MY-P}" fill="rgba(34,197,94,0.06)" />
                <rect x="${P}" y="${MY}" width="${MX-P}" height="${CH-P-MY}" fill="rgba(239,68,68,0.06)" />
                <rect x="${MX}" y="${MY}" width="${CW-P-MX}" height="${CH-P-MY}" fill="rgba(245,158,11,0.06)" />

                <text x="${P+10}" y="${P+30}" fill="#60a5fa" font-size="10" font-weight="900" style="letter-spacing:1px">IMPROVING</text>
                <text x="${CW-P-10}" y="${P+30}" fill="#22c55e" font-size="10" font-weight="900" style="letter-spacing:1px" text-anchor="end">LEADING</text>
                <text x="${P+10}" y="${CH-P-15}" fill="#ef4444" font-size="10" font-weight="900" style="letter-spacing:1px">LAGGING</text>
                <text x="${CW-P-10}" y="${CH-P-15}" fill="#f59e0b" font-size="10" font-weight="900" style="letter-spacing:1px" text-anchor="end">WEAKENING</text>

                <line x1="${MX}" y1="${P}" x2="${MX}" y2="${CH-P}" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="8,4" />
                <line x1="${P}" y1="${MY}" x2="${CW-P}" y2="${MY}" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="8,4" />
            `;

            processed.forEach(s => {
                const q = s.rs >= RS_MID ? (s.mom >= MOM_MID ? 'leading' : 'weakening') : (s.mom >= MOM_MID ? 'improving' : 'lagging');
                const col = Q_COLORS[q];
                const curX = px(s.rs), curY = py(s.mom);
                
                const pts = (s.path || []).map(p => ({ x: px(p.x), y: py(p.y) }));
                const polyLine = pts.map(p => `${p.x},${p.y}`).join(' ');

                let isVortex = false;
                if (pts.length >= 3) {
                    const v1 = { x: pts[1].x-pts[0].x, y: pts[1].y-pts[0].y };
                    const v2 = { x: pts[2].x-pts[1].x, y: pts[2].y-pts[1].y };
                    const dot = v1.x*v2.x + v1.y*v2.y;
                    const cos = dot / (Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y) || 1);
                    if (Math.acos(Math.max(-1,Math.min(1,cos))) > 0.45) isVortex = true;
                }

                html += `
                    <g opacity="1" style="cursor:pointer" onclick="showSpotlight('${s.ticker}')">
                        <polyline points="${polyLine}" fill="none" stroke="${col}" stroke-width="12" stroke-opacity="0.04" stroke-linecap="round"/>
                        <polyline points="${polyLine}" fill="none" stroke="${col}" stroke-width="2" stroke-opacity="0.8" stroke-linecap="round" filter="url(#glow)" />
                        
                        ${pts.map((p, i) => `
                            <circle cx="${p.x}" cy="${p.y}" r="1.8" fill="${col}" opacity="${0.1 + (i*0.15)}"/>
                        `).join('')}

                        ${isVortex ? `
                            <circle cx="${curX}" cy="${curY}" r="18" fill="none" stroke="${col}" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6">
                                <animateTransform attributeName="transform" type="rotate" from="0 ${curX} ${curY}" to="360 ${curX} ${curY}" dur="4s" repeatCount="indefinite" />
                            </circle>
                        ` : ''}

                        ${pts[1] ? `
                            <line x1="${curX}" y1="${curY}" x2="${curX + (curX-pts[1].x)*1.5}" y2="${curY + (curY-pts[1].y)*1.5}" stroke="${col}" stroke-width="1" opacity="0.5" />
                        ` : ''}

                        <circle cx="${curX}" cy="${curY}" r="11" fill="${col}" stroke="#0a1120" stroke-width="1.2" />
                        <text x="${curX}" y="${curY+0.4}" text-anchor="middle" dominant-baseline="middle" fill="#04091a" font-size="8" font-weight="900" font-family="monospace">${s.ticker}</text>
                    </g>
                `;
            });

            svg.innerHTML = html;
            renderTicker(processed);
            renderPanels(processed);
        }

        function renderTicker(stocks) {
            const list = [...stocks, ...stocks];
            document.getElementById('tickerBanner').innerHTML = `
                <div class="banner-scroll">
                    ${list.map(s => `
                        <div class="banner-item">
                            <span style="color:${Q_COLORS[s.rs >= 85 ? (s.mom >= 0 ? 'leading' : 'weakening'):(s.mom >= 0 ? 'improving' : 'lagging')] || '#fff'}">${s.ticker}</span> 
                            <span style="color:rgba(255,255,255,0.4)">${s.rs}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderPanels(stocks) {
            const leading = stocks.filter(s => s.rs >= 85 && s.mom >= 0).sort((a,b)=>b.mom-a.mom).slice(0,4);
            document.getElementById('velocityPanel').innerHTML = `
                <div class="mini-title">⚡ High Velocity</div>
                ${leading.map(s => `
                    <div class="signal-item" onclick="showSpotlight('${s.ticker}')">
                        <span class="signal-ticker" style="color:#22c55e">${s.ticker}</span>
                        <span style="color:#475569">${s.rs} RS / +${s.mom.toFixed(1)}</span>
                    </div>
                `).join('')}
            `;

            const vortex = stocks.filter(s => {
                const pts = s.path || [];
                if (pts.length < 3) return false;
                const v1 = { x: pts[1].x-pts[0].x, y: pts[1].y-pts[0].y };
                const v2 = { x: pts[2].x-pts[1].x, y: pts[2].y-pts[1].y };
                const dot = v1.x*v2.x + v1.y*v2.y;
                const cos = dot / (Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y) || 1);
                return Math.acos(Math.max(-1,Math.min(1,cos))) > 0.45;
            }).slice(0,4);

            document.getElementById('vortexPanel').innerHTML = `
                <div class="mini-title">↻ Vortex Reversals</div>
                ${vortex.map(s => `
                    <div class="signal-item" onclick="showSpotlight('${s.ticker}')">
                        <span class="signal-ticker" style="color:#f59e0b">${s.ticker}</span>
                        <span style="color:#475569">Arcing Rotation</span>
                    </div>
                `).join('')}
            `;
        }

        function showSpotlight(ticker) {
            const s = allData.find(x => x.ticker === ticker);
            if (!s) return;
            const h = history[ticker] || [];
            const mom = h[0] !== undefined && h[7] !== undefined ? (h[0]-h[7]).toFixed(1) : "0.0";
            
            document.getElementById('spotlightContent').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; gap:15px; align-items:center;">
                        <span style="font-size:24px; font-weight:900; color:#fff;">${s.ticker}</span>
                        <div>
                            <div style="font-size:13px; font-weight:700; color:var(--accent);">${s.rs} RS • ${mom >= 0 ? '+':''}${mom} Momentum</div>
                            <div style="font-size:10px; color:var(--text-dim);">${s.sector}</div>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <a href="https://www.tradingview.com/chart/?symbol=${s.ticker}" target="_blank" style="color:var(--accent); font-size:10px; text-decoration:none;">VIEW CHART ↗</a>
                        <div style="font-size:10px; color:var(--text-dim); margin-top:4px;">${s.industry}</div>
                    </div>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
