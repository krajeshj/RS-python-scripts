<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Stock Rotation - Rajesh's Stock Screener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts/umd/Recharts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06060f;--bg2: #0d0d1a;--surface: rgba(255, 255, 255, .04);--border: rgba(255, 255, 255, .08);
            --text: #e4e4ef;--text2: #8888a8;--accent: #00e5ff;--cyan: #00e5ff;
            --font: 'Outfit', system-ui, sans-serif;--mono: 'JetBrains Mono', monospace;
        }
        html, body { width: 100%; margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden; }
        .nav { background: rgba(6, 6, 15, 0.9); border-bottom: 1px solid var(--border); padding: 0 20px; height: 50px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(12px); }
        .nav-links { display: flex; gap: 15px; }
        .nav-link { color: var(--text2); text-decoration: none; font-size: 11px; font-weight: 700; text-transform: uppercase; transition: color 0.2s; }
        .nav-link:hover, .nav-link.active { color: var(--accent); }
        
        input[type="range"] { -webkit-appearance: none; background: #1e293b; height: 4px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const Q_FILL = { leading:"#22c55e", weakening:"#f59e0b", lagging:"#ef4444", improving:"#60a5fa" };
        const CW=400, CH=400, P=40;

        function TickerBanner({ stocks }) {
          return (
            <div style={{height:30, background:"rgba(0,0,0,0.3)", borderTop:"1px solid var(--border)", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", overflow:"hidden", marginBottom:15}}>
              <div style={{display:"flex", whiteSpace:"nowrap", animation:"scroll 50s linear infinite"}}>
                {[...stocks, ...stocks].map((s,i) => (
                  <span key={i} style={{paddingRight:30, fontSize:10, fontWeight:700, fontFamily: "var(--mono)", color: s.color}}>
                    {s.ticker} <span style={{color:"#475569"}}>{s.rs}</span>
                  </span>
                ))}
              </div>
              <style>{`@keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }`}</style>
            </div>
          );
        }

        function RRGChart({ stocks, medX, medY, minX, maxX, minY, maxY }) {
          const px = v => P + ((v - minX) / (maxX - minX || 1)) * (CW - P*2);
          const py = v => (CH - P) - ((v - minY) / (maxY - minY || 1)) * (CH - P*2);
          const MX=px(medX), MY=py(medY);

          return (
            <svg viewBox={"0 0 "+CW+" "+CH} width="100%" style={{display:"block"}}>
              <defs>
                {stocks.map(s => (
                  <marker key={"m"+s.ticker} id={"m"+s.ticker} markerWidth="10" markerHeight="5" refX="9" refY="2.5" orient="auto">
                    <polygon points="0 0.6,9 2.5,0 4.4" fill={s.color}/>
                  </marker>
                ))}
              </defs>
              <rect x={P} y={P} width={MX-P} height={MY-P} fill="rgba(96,165,250,0.05)"/><rect x={MX} y={P} width={CW-P-MX} height={MY-P} fill="rgba(34,197,94,0.05)"/><rect x={P} y={MY} width={MX-P} height={CH-P-MY} fill="rgba(239,68,68,0.05)"/><rect x={MX} y={MY} width={CW-P-MX} height={CH-P-MY} fill="rgba(245,158,11,0.05)"/>
              <line x1={MX} y1={P} x2={MX} y2={CH-P} stroke="#1e293b" strokeWidth="1" strokeDasharray="5,4"/><line x1={P} y1={MY} x2={CW-P} y2={MY} stroke="#1e293b" strokeWidth="1" strokeDasharray="5,4"/>
              
              {stocks.map(s => {
                const curX=px(s.xVal), curY=py(s.mom);
                const pathPts = (s.path || []).map(p => ({ x: px(p.x), y: py(p.y) }));
                const polyStr = pathPts.map(p => p.x + "," + p.y).join(" ");
                const vX = curX - (pathPts[1] ? pathPts[1].x : curX), vY = curY - (pathPts[1] ? pathPts[1].y : curY);

                // Predictive Dash
                let projStr = `${curX},${curY} `;
                for(let t=1; t<=4; t++) {
                     projStr += `${curX + vX*t*0.7},${curY + vY*t*0.7} `;
                }

                return (
                  <g key={s.ticker}>
                    <polyline points={polyStr} fill="none" stroke={s.color} strokeWidth="1.5" strokeOpacity="0.3" strokeLinecap="round" strokeLinejoin="round"/>
                    <polyline points={projStr} fill="none" stroke={s.color} strokeWidth="2" strokeDasharray="3,2" opacity="0.3" />
                    {pathPts.slice(0,-1).map((p,i)=>(<circle key={i} cx={p.x} cy={p.y} r="1.5" fill={s.color} opacity={0.1+i*0.1}/>))}
                    <line x1={curX} y1={curY} x2={curX+vX*1.5} y2={curY+vY*1.5} stroke={s.color} strokeWidth="1.2" markerEnd={"url(#m"+s.ticker+")"}/>
                    <circle cx={curX} cy={curY} r="10" fill={s.color} stroke="#000" strokeWidth="1"/>
                    <text x={curX} y={curY+0.4} textAnchor="middle" dominantBaseline="middle" fill="#000" fontSize="7" fontWeight="800" fontFamily="monospace">{s.ticker}</text>
                  </g>
                );
              })}
            </svg>
          );
        }

        function App() {
          const [allData, setAllData] = useState([]);
          const [hist, setHist] = useState({});
          const [minRS, setMinRS] = useState(80);
          const [filters, setFilters] = useState({ minervini: false, leader: false });

          useEffect(() => {
            const ts = Date.now();
            Promise.all([
                fetch(`web_data.json?v=${ts}`).then(r=>r.json()),
                fetch(`stock_history.json?v=${ts}`).then(r=>r.json())
            ]).then(([web, h]) => {
                setAllData(web.all_stocks || web.stocks || []);
                setHist(h);
            });
          }, []);

          const processed = useMemo(() => {
            const filtered = allData.filter(s => {
                if (s.rs < minRS) return false;
                if (filters.minervini && !s.is_minervini) return false;
                if (filters.leader && (!s.is_up || s.rs < 80)) return false;
                return true;
            }).slice(0, 40);

            return filtered.map(s => {
                const h = (hist[s.ticker] || []).slice(0, 20);
                const path = [];
                const weights = [0.4, 0.3, 0.2, 0.1];
                let wMom = 0;
                for(let i=0; i<8; i++) {
                    const r = h[i], r_prev = h[i+7];
                    if (r !== undefined && r_prev !== undefined) {
                      const m = r - r_prev;
                      path.push({ x: s.rs_raw ? Math.log2(r + 1) * 15 : r, y: m });
                      if (i < 4) wMom += m * weights[i];
                    }
                }
                const xVal = s.rs_raw ? Math.log2(s.rs + 1) * 15 : s.rs;
                const mom = wMom * 3;
                const q = s.rs >= 85 ? (mom >= 0 ? "leading" : "weakening") : (mom >= 0 ? "improving" : "lagging");
                return { ...s, xVal, mom, path, q, color: Q_FILL[q] };
            });
          }, [allData, hist, minRS, filters]);

          const stats = useMemo(() => {
            const x = processed.map(s=>s.xVal), y = processed.map(s=>s.mom);
            const medX = x.length ? x.sort((a,b)=>a-b)[Math.floor(x.length/2)] : 50;
            const medY = y.length ? y.sort((a,b)=>a-b)[Math.floor(y.length/2)] : 0;
            return {
                medX, medY,
                minX: Math.min(...x, medX-10), maxX: Math.max(...x, medX+10),
                minY: Math.min(...y, medY-5), maxY: Math.max(...y, medY+5)
            };
          }, [processed]);

          return (
            <div style={{minHeight:"100vh", paddingBottom:40}}>
              <nav className="nav">
                <div style={{fontWeight: 900, fontSize: 16}}>NEURAL<span style={{color:var(--accent)}}>RADAR</span></div>
                <div className="nav-links">
                    <a href="index.html" className="nav-link">Dashboard</a>
                    <a href="stock_rotation.html" className="nav-link active">Stocks</a>
                    <a href="rotation.html" className="nav-link">Sectors</a>
                    <a href="industries.html" className="nav-link">Industries</a>
                </div>
              </nav>

              <div style={{padding:"20px 15px"}}>
                <h1 style={{fontSize:20, fontWeight:700, margin:"0 0 15px 0"}}>Stock Rotation Map</h1>
                <TickerBanner stocks={processed} />
                
                <div style={{background:"#0f172a", border:"1px solid #1e293b", borderRadius:12, padding:"12px", marginBottom:12}}>
                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:15}}>
                        <div style={{fontSize:11, fontWeight:700, color:"#64748b"}}>MIN RS: <span style={{color:"#fff"}}>{minRS}</span></div>
                        <input type="range" min="0" max="99" value={minRS} onChange={e=>setMinRS(parseInt(e.target.value))} style={{width:100}}/>
                    </div>
                </div>

                <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:"13px 12px",marginBottom:10}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:10}}>Relative Rotation Graph</div>
                  <div style={{background:"#0a1120",borderRadius:8,border:"1px solid #1e293b"}}>
                      <RRGChart stocks={processed} {...stats} />
                  </div>
                </div>

                <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,padding:"12px 13px"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",marginBottom:8}}>High Pulse Leaderboard</div>
                    {processed.sort((a,b)=>b.mom-a.mom).slice(0,5).map(s => (
                        <div key={s.ticker} style={{display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:6}}>
                            <span style={{color:s.color, fontWeight:700}}>{s.ticker}</span>
                            <span style={{color:"#64748b"}}>{s.mom.toFixed(2)}v</span>
                        </div>
                    ))}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
