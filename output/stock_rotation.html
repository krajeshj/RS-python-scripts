<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Stock Rotation - Rajesh's Stock Screener</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- React & Recharts Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-is@18/umd/react-is.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts/umd/Recharts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg: #06060f;
            --bg2: #0d0d1a;
            --surface: rgba(255, 255, 255, .04);
            --border: rgba(255, 255, 255, .08);
            --text: #e4e4ef;
            --text2: #8888a8;
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --cyan: #00e5ff;
            --font: 'Outfit', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        html, body {
            width: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow-x: hidden;
        }

        header {
            margin-bottom: 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
            background: rgba(6, 6, 15, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }

        .logo-icon {
            font-size: 2.5rem;
            color: var(--accent2);
            margin-bottom: 4px;
            filter: drop-shadow(0 0 10px rgba(162, 155, 254, 0.3));
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text) 30%, var(--accent2));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            margin: 0.5rem 0;
        }

        .nav-link {
            color: var(--text2);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 6px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--surface);
        }

        .nav-link.active {
            color: var(--accent2);
            background: rgba(162, 155, 254, 0.1);
            border-color: rgba(162, 155, 254, 0.2);
        }

        #root {
            min-height: calc(100vh - 160px);
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.75rem; }
            .nav-links { gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
            .nav-link { font-size: 0.85rem; padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-icon">💹</div>
        <h1>Rajesh's Stock Screener</h1>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard 🚀</a>
            <a href="stages.html" class="nav-link">Sector Analysis 🏗️</a>
            <a href="industries.html" class="nav-link">Industry Momentum 📊</a>
            <a href="quick_scan.html" class="nav-link">Quick Scan ⚡</a>
            <a href="pulse.html" class="nav-link">Market Pulse 📡</a>
            <a href="tips.html" class="nav-link">Stock Tips 🎯</a>
            <a href="rotation.html" class="nav-link">Sector Rotation 🔄</a>
            <a href="stock_rotation.html" class="nav-link active">Stock Rotation 💹</a>
        </div>
    </header>

    <div id="root"></div>

    <footer style="text-align:center; padding:2rem 1rem; color:var(--text2); font-size:0.75rem; border-top:1px solid var(--border); margin-top:2rem;">
        © 2026 Rajesh's Stock Screener. All rights reserved.
    </footer>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const Lib = window.Recharts || window._Recharts;
        if (!Lib) {
            document.body.innerHTML = '<div style="color:white;padding:20px;text-align:center;"><h3>Error: Recharts library failed to load.</h3></div>';
            throw new Error("Recharts not found");
        }
        const { 
            LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid,
            Tooltip, Legend, ResponsiveContainer, ReferenceLine, Cell, ScatterChart, Scatter 
        } = Lib;

        const Q_FILL = { leading: "#22c55e", weakening: "#f59e0b", lagging: "#ef4444", improving: "#60a5fa" };
        const CW = 520, CH = 440, P = 48;
        
        // Axes for Stocks: RS (X) from 30 to 100, Momentum (Y) from -12 to 12
        const X_MIN = 30, X_MAX = 100, X_MID = 85;
        const Y_MIN = -12, Y_MAX = 12, Y_MID = 0;

        const px = v => P + ((v - X_MIN) / (X_MAX - X_MIN)) * (CW - P * 2);
        const py = v => (CH - P) - ((v - Y_MIN) / (Y_MAX - Y_MIN)) * (CH - P * 2);

        function TickerBanner({ stocks }) {
            const items = [...stocks, ...stocks]; 
            return (
                <div style={{
                    background:"#040a14", borderBottom:"1px solid #1e293b", borderTop:"1px solid #1e293b",
                    overflow:"hidden", height:32, display:"flex", alignItems:"center", marginBottom:14, position:"relative",
                }}>
                    <div style={{
                        display:"flex", gap:0, animation:`ticker-scroll ${items.length * 3.5}s linear infinite`,
                        whiteSpace:"nowrap", willChange:"transform",
                    }}>
                        <style>{`
                            @keyframes ticker-scroll {
                                0%   { transform: translateX(0); }
                                100% { transform: translateX(-50%); }
                            }
                        `}</style>
                        {items.map((item, i) => (
                            <span key={i} style={{ display:"inline-flex", alignItems:"center", gap:6, paddingRight:28, fontSize:10.5, fontFamily:"'DM Mono', monospace"}}>
                                <span style={{ color:Q_FILL[item.quadrant], fontWeight:700 }}>{item.ticker}</span>
                                <span style={{ color:"#f1f5f9" }}>RS {item.rs}</span>
                                <span style={{ color:"#22c55e", fontWeight:600 }}>{item.momentum >= 0 ? "+" : ""}{item.momentum.toFixed(1)}</span>
                                <span style={{ color:"#1e293b", paddingLeft:8 }}>│</span>
                            </span>
                        ))}
                    </div>
                </div>
            );
        }

        function RRGChart({ stocks, highlightTicker }) {
            const MX = px(X_MID), MY = py(Y_MID);
            const R = 11;

            const getTrailPoints = (s) => (s.trail || []).map(p => ({ x: px(p.x), y: py(p.y) }));

            return (
                <svg viewBox={`0 0 ${CW} ${CH}`} width="100%" style={{ display: "block" }}>
                    <defs>
                        {stocks.map(s => (
                            <linearGradient key={`g-${s.ticker}`} id={`g-${s.ticker}`} x1={px(s.trail?.[0]?.x || s.rs)} y1={py(s.trail?.[0]?.y || s.momentum)} x2={px(s.rs)} y2={py(s.momentum)} gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stopColor={Q_FILL[s.quadrant]} stopOpacity="0" />
                                <stop offset="100%" stopColor={Q_FILL[s.quadrant]} stopOpacity="1" />
                            </linearGradient>
                        ))}
                        {stocks.map(s => (
                            <marker key={`m-${s.ticker}`} id={`m-${s.ticker}`} markerWidth="10" markerHeight="5" refX="9" refY="2.5" orient="auto">
                                <polygon points="0 0.6,9 2.5,0 4.4" fill={Q_FILL[s.quadrant]} />
                            </marker>
                        ))}
                        <radialGradient id="cross-grad" cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="#ffffff" stopOpacity="0.6"/><stop offset="100%" stopColor="#ffffff" stopOpacity="0.0"/></radialGradient>
                    </defs>

                    {/* Quadrant Backgrounds */}
                    <rect x={P} y={P} width={MX-P} height={MY-P} fill="rgba(96,165,250,0.03)" />
                    <rect x={MX} y={P} width={CW-P-MX} height={MY-P} fill="rgba(34,197,94,0.03)" />
                    <rect x={P} y={MY} width={MX-P} height={CH-P-MY} fill="rgba(239,68,68,0.03)" />
                    <rect x={MX} y={MY} width={CW-P-MX} height={CH-P-MY} fill="rgba(245,158,11,0.03)" />

                    {/* Labels */}
                    {[[P+8,P+16,"#60a5fa","IMPROVING"],[MX+8,P+16,"#22c55e","LEADING"],[P+8,MY+16,"#ef4444","LAGGING"],[MX+8,MY+16,"#f59e0b","WEAKENING"]].map(([x,y,c,l]) => (
                        <text key={l} x={x} y={y} fill={c} fontSize="10" fontWeight="700" letterSpacing="1" opacity="0.6" fontFamily="monospace">{l}</text>
                    ))}

                    <line x1={MX} y1={P} x2={MX} y2={CH-P} stroke="#1e293b" strokeWidth="1.2" strokeDasharray="5,4" />
                    <line x1={P} y1={MY} x2={CW-P} y2={MY} stroke="#1e293b" strokeWidth="1.2" strokeDasharray="5,4" />
                    <text x={CW-P-4} y={MY+13} textAnchor="end" fill="#475569" fontSize="9" fontFamily="monospace">RELATIVE STRENGTH →</text>
                    <text x={MX+5} y={P+11} fill="#475569" fontSize="9" fontFamily="monospace">MOMENTUM ↑</text>

                    {/* Stock Trails & Heads */}
                    {stocks.map(s => {
                        const cx = px(s.rs), cy = py(s.momentum);
                        const pts = getTrailPoints(s);
                        const polyStr = pts.length > 0 ? pts.map(p => `${p.x},${p.y}`).join(" ") + ` ${cx},${cy}` : "";
                        
                        return (
                            <g key={s.ticker} onMouseEnter={() => {}} style={{ cursor: "pointer" }}>
                                {polyStr && (
                                    <polyline points={polyStr} fill="none" stroke={`url(#g-${s.ticker})`} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.6" />
                                )}
                                {highlightTicker === s.ticker && (
                                    <circle cx={cx} cy={cy} r={R + 5} fill="none" stroke="#fff" strokeWidth="1.5" opacity="0.6" />
                                )}
                                <circle cx={cx} cy={cy} r={R} fill={Q_FILL[s.quadrant]} stroke="#0a1120" strokeWidth="1" />
                                <text x={cx} y={cy + 0.5} textAnchor="middle" dominantBaseline="middle" fill="#04091a" fontSize="7" fontWeight="800" fontFamily="monospace">{s.ticker}</text>
                            </g>
                        );
                    })}
                </svg>
            );
        }

        function SignalPanel({ stocks, onHover }) {
            const categories = {
                vortex: stocks.filter(s => (s.streak || 0) > 4),
                crossers: stocks.filter(s => Math.abs(s.momentum) < 1 && s.rs < 86 && s.rs > 84),
                leaders: stocks.filter(s => s.quadrant === 'leading').slice(0, 4)
            };

            return (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 10 }}>
                    <div style={{ background: "#0a1120", border: "1px solid #1e293b", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ fontSize: 9, color: "#475569", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 6 }}>🚀 Leading Velocity</div>
                        {categories.leaders.map(s => (
                            <div key={s.ticker} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }} onMouseEnter={() => onHover(s.ticker)} onMouseLeave={() => onHover(null)}>
                                <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#22c55e" }} />
                                <span style={{ fontSize: 10, color: "#22c55e", fontWeight: 700 }}>{s.ticker}</span>
                                <span style={{ fontSize: 9, color: "#475569" }}>{s.rs} RS / +{s.momentum.toFixed(1)}m</span>
                            </div>
                        ))}
                    </div>
                    <div style={{ background: "#0a1120", border: "1px solid #1e293b", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ fontSize: 9, color: "#475569", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 6 }}>↻ Sustained Trend</div>
                        {categories.vortex.slice(0, 4).map(s => (
                            <div key={s.ticker} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }} onMouseEnter={() => onHover(s.ticker)} onMouseLeave={() => onHover(null)}>
                                <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#f59e0b" }} />
                                <span style={{ fontSize: 10, color: "#f59e0b", fontWeight: 700 }}>{s.ticker}</span>
                                <span style={{ fontSize: 9, color: "#475569" }}>{s.streak}d in quadrant</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function SymbolSpotlight({ stocks }) {
            const [idx, setIdx] = useState(0);
            const s = stocks[idx] || stocks[0];
            if (!s) return null;
            return (
                <div style={{ background: "#0a1120", border: `1px solid ${Q_FILL[s.quadrant]}44`, borderRadius: 10, padding: "12px", marginTop: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <div style={{ width: 8, height: 8, borderRadius: "50%", background: Q_FILL[s.quadrant] }} />
                            <span style={{ fontSize: 11, fontWeight: 700, color: "#f1f5f9", textTransform: "uppercase" }}>Symbol Spotlight</span>
                        </div>
                        <div style={{ display: "flex", gap: 5 }}>
                            <button onClick={() => setIdx(v => (v - 1 + stocks.length) % stocks.length)} style={{ background: "#0f172a", border: "1px solid #1e293b", color: "#64748b", borderRadius: 4, padding: "2px 8px", cursor: "pointer" }}>‹</button>
                            <button onClick={() => setIdx(v => (v + 1) % stocks.length)} style={{ background: "#0f172a", border: "1px solid #1e293b", color: "#64748b", borderRadius: 4, padding: "2px 8px", cursor: "pointer" }}>›</button>
                        </div>
                    </div>
                    <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                        <div style={{ fontSize: 24, fontWeight: 900, color: "#fff" }}>{s.ticker}</div>
                        <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, fontWeight: 700, color: Q_FILL[s.quadrant] }}>{s.rs} RS • {s.momentum > 0 ? "+" : ""}{s.momentum.toFixed(1)} Momentum</div>
                            <div style={{ fontSize: 10, color: "#64748b" }}>{s.name} • {s.sector}</div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 12, fontWeight: 800 }}>${s.price}</div>
                            <div style={{ fontSize: 9, color: "#4ade80" }}>{s.quadrant.toUpperCase()}</div>
                        </div>
                    </div>
                </div>
            );
        }

        function RankTab({ data }) {
            return (
                <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 10, padding: "12px 13px", marginTop: 10 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#f1f5f9", marginBottom: 8 }}>Stock Rotation Signals</div>
                    <div style={{ overflowX: "auto" }}>
                        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 10 }}>
                            <thead>
                                <tr style={{ color: "#475569", borderBottom: "1px solid #1e293b", textAlign: "left" }}>
                                    <th style={{ padding: 8 }}>Symbol</th>
                                    <th style={{ padding: 8 }}>Quadrant</th>
                                    <th style={{ padding: 8 }}>RS</th>
                                    <th style={{ padding: 8 }}>Momentum</th>
                                    <th style={{ padding: 8 }}>Trend</th>
                                </tr>
                            </thead>
                            <tbody>
                                {data.slice(0, 15).map((s, i) => (
                                    <tr key={s.ticker} style={{ background: i % 2 === 0 ? "#0a1120" : "transparent" }}>
                                        <td style={{ padding: 8, fontWeight: 700, color: "#fff" }}>{s.ticker}</td>
                                        <td style={{ padding: 8, color: Q_FILL[s.quadrant] }}>{s.quadrant}</td>
                                        <td style={{ padding: 8 }}>{s.rs}</td>
                                        <td style={{ padding: 8, color: s.momentum >= 0 ? "#22c55e" : "#ef4444" }}>{s.momentum.toFixed(1)}</td>
                                        <td style={{ padding: 8, fontWeight: 700, color: s.momentum > 2 ? "#22c55e" : s.momentum < -2 ? "#ef4444" : "#f59e0b" }}>
                                            {s.momentum > 2 ? "▲ BULL" : s.momentum < -2 ? "▼ BEAR" : "— FLAT"}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function App() {
            const [data, setData] = useState([]);
            const [tab, setTab] = useState("rrg");
            const [hovered, setHovered] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const load = async () => {
                    try {
                        const [resMain, resHistory] = await Promise.all([
                            fetch('web_data.json'),
                            fetch('stock_history.json')
                        ]);
                        const webData = await resMain.json();
                        const history = await resHistory.json();
                        
                        const processed = (webData.all_stocks || []).slice(0, 40).map(s => {
                            const h = history[s.ticker] || [];
                            const curRS = h[0] !== undefined ? h[0] : s.rs;
                            const momLookback = 7;
                            const prevRS = h[momLookback] !== undefined ? h[momLookback] : (s.rs_1w_pct || s.rs);
                            const momentum = curRS - prevRS;
                            
                            let quadrant = "lagging";
                            if (curRS >= 85) quadrant = momentum >= 0 ? "leading" : "weakening";
                            else quadrant = momentum >= 0 ? "improving" : "lagging";

                            // Streak calculation
                            let streak = 0;
                            for (let i = 0; i < h.length - momLookback; i++) {
                                const tempRS = h[i];
                                const tempPrev = h[i + momLookback];
                                if (tempRS === undefined || tempPrev === undefined) break;
                                const tempMom = tempRS - tempPrev;
                                let tempQ = tempRS >= 85 ? (tempMom >= 0 ? "leading" : "weakening") : (tempMom >= 0 ? "improving" : "lagging");
                                if (tempQ === quadrant) streak++; else break;
                            }

                            const trail = h.slice(0, 8).reverse().map((v, idx) => {
                                const lookbackIdx = 7 - idx;
                                const pV = h[lookbackIdx + momLookback] !== undefined ? h[lookbackIdx + momLookback] : v;
                                return { x: v, y: v - pV };
                            });

                            return { ...s, rs: curRS, momentum, quadrant, streak, trail };
                        });
                        setData(processed);
                        setLoading(false);
                    } catch (e) { console.error(e); setLoading(false); }
                };
                load();
            }, []);

            if (loading) return <div style={{ color: "#fff", textAlign: "center", padding: 100 }}>Initializing Rotation Engine...</div>;

            const promising = data.filter(s => s.quadrant === 'leading' || s.quadrant === 'improving').sort((a,b) => b.rs - a.rs);

            return (
                <div style={{ background: "#070d1a", minHeight: "100vh", color: "#e2e8f0", padding: "20px 15px" }}>
                    <div style={{ marginBottom: 18 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                            <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#00e5ff", boxShadow: "0 0 7px #00e5ff" }} />
                            <span style={{ fontSize: 10, color: "#00e5ff", letterSpacing: "0.2em" }}>STOCK ROTATION ANALYSIS • 1.5W WINDOW</span>
                        </div>
                        <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9" }}>Stock Rotation Dashboard</h1>
                    </div>

                    <TickerBanner stocks={promising} />

                    <div style={{ display: "flex", gap: 5, marginBottom: 16 }}>
                        {[{id:"rrg", label:"Rotation Map"}, {id:"rank", label:"Signals"}].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} style={{ padding: "6px 16px", borderRadius: 20, border: tab === t.id ? "1px solid #00e5ff" : "1px solid #1e293b", background: tab === t.id ? "rgba(0,229,255,0.1)" : "#0f172a", color: tab === t.id ? "#00e5ff" : "#64748b", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{t.label}</button>
                        ))}
                    </div>

                    {tab === "rrg" && (
                        <div>
                            <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: "13px 12px" }}>
                                <div style={{ background: "#0a1120", borderRadius: 8, border: "1px solid #1e293b" }}>
                                    <RRGChart stocks={data.slice(0, 30)} highlightTicker={hovered} />
                                </div>
                                <SignalPanel stocks={data} onHover={setHovered} />
                                <SymbolSpotlight stocks={promising} />
                            </div>
                        </div>
                    )}

                    {tab === "rank" && <RankTab data={data} />}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
