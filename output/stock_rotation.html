<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Rotation | Rajesh's Stock Screener</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #04091a; --card: #0a1120; --border: #1e293b; --text: #f1f5f9; --mono: 'DM Mono', monospace; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const Lib = window.Recharts || window._Recharts;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine, Cell } = Lib;

        const Q_FILL = { leading: "#22c55e", weakening: "#f59e0b", lagging: "#ef4444", improving: "#60a5fa" };
        const CW = 520, CH = 440, P = 48;
        
        const X_MIN = 30, X_MAX = 100, X_MID = 85;
        const Y_MIN = -12, Y_MAX = 12, Y_MID = 0;
        const DRX = X_MAX - X_MIN, DRY = Y_MAX - Y_MIN;

        const px = v => P + ((Math.max(X_MIN, Math.min(X_MAX, v)) - X_MIN) / DRX) * (CW - P * 2);
        const py = v => (CH - P) - ((Math.max(Y_MIN, Math.min(Y_MAX, v)) - Y_MIN) / DRY) * (CH - P * 2);

        function trailCurvature(allPts) {
            if (allPts.length < 3) return 0;
            const m = Math.floor(allPts.length/2);
            const v1 = { x: px(allPts[m].x)-px(allPts[0].x), y: py(allPts[m].y)-py(allPts[0].y) };
            const v2 = { x: px(allPts[allPts.length-1].x)-px(allPts[m].x), y: py(allPts[allPts.length-1].y)-py(allPts[m].y) };
            const dot = v1.x*v2.x + v1.y*v2.y;
            const mag = Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y)||1;
            return Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI;
        }

        function axisCrossings(allPts) {
            const cr = [];
            for (let i=1; i<allPts.length; i++) {
                const a=allPts[i-1], b=allPts[i];
                if ((a.x-X_MID)*(b.x-X_MID)<0) cr.push({x:X_MID, y:a.y+(b.y-a.y)*(X_MID-a.x)/(b.x-a.x)});
                if ((a.y-Y_MID)*(b.y-Y_MID)<0) cr.push({x:a.x+(b.x-a.x)*(Y_MID-a.y)/(b.y-a.y), y:Y_MID});
            }
            return cr;
        }

        function getConvergence(stocks) {
            const counts = { leading: 0, weakening: 0, lagging: 0, improving: 0 };
            stocks.forEach(s => {
                const h = s.trail || []; if (h.length < 2) return;
                const prev = h[h.length-1];
                const dx = s.rs - prev.x, dy = s.momentum - prev.y;
                const tx = s.rs + dx*1.5, ty = s.momentum + dy*1.5;
                const tq = tx>=85 ? (ty>=0?"leading":"weakening") : (ty>=0?"improving":"lagging");
                counts[tq]++;
            });
            return counts;
        }

        function TickerBanner({ stocks }) {
            const items = [...stocks, ...stocks]; 
            return (
                <div style={{ background: "#040a14", borderBottom: "1px solid #1e293b", overflow: "hidden", height: 32, display: "flex", alignItems: "center", marginBottom: 14 }}>
                    <div style={{ display: "flex", animation: `ticker-scroll ${items.length * 4}s linear infinite`, whiteSpace: "nowrap" }}>
                        <style>{`@keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }`}</style>
                        {items.map((item, i) => (
                            <span key={i} style={{ paddingRight: 28, fontSize: 10.5, fontFamily: "monospace" }}>
                                <span style={{ color: Q_FILL[item.quadrant], fontWeight: 700 }}>{item.ticker}</span> <span style={{ color: "#22c55e" }}>+{item.momentum.toFixed(1)}</span>
                            </span>
                        ))}
                    </div>
                </div>
            );
        }

        function SymbolSpotlight({ stocks }) {
            const [idx, setIdx] = useState(0);
            const s = stocks[idx] || stocks[0];
            if (!s) return null;
            return (
                <div style={{ background: "#0a1120", border: `1px solid ${Q_FILL[s.quadrant]}44`, borderRadius: 10, padding: "12px", marginTop: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <div style={{ width: 8, height: 8, borderRadius: "50%", background: Q_FILL[s.quadrant] }} />
                            <span style={{ fontSize: 11, fontWeight: 700, color: "#f1f5f9", textTransform: "uppercase" }}>Symbol Spotlight</span>
                        </div>
                        <div style={{ display: "flex", gap: 5 }}>
                            <button onClick={() => setIdx(v => (v - 1 + stocks.length) % stocks.length)} style={{ background: "#0f172a", border: "1px solid #1e293b", color: "#64748b", borderRadius: 4, padding: "2px 8px", cursor: "pointer" }}>‹</button>
                            <button onClick={() => setIdx(v => (v + 1) % stocks.length)} style={{ background: "#0f172a", border: "1px solid #1e293b", color: "#64748b", borderRadius: 4, padding: "2px 8px", cursor: "pointer" }}>›</button>
                        </div>
                    </div>
                    <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                        <div style={{ fontSize: 24, fontWeight: 900, color: "#fff" }}>{s.ticker}</div>
                        <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, fontWeight: 700, color: Q_FILL[s.quadrant] }}>{s.rs} RS • {s.momentum > 0 ? "+" : ""}{s.momentum.toFixed(1)} Momentum</div>
                            <div style={{ fontSize: 10, color: "#64748b" }}>{s.name} • {s.sector}</div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 12, fontWeight: 800 }}>Streak: {s.streak}d</div>
                            <div style={{ fontSize: 9, color: "#4ade80" }}>{s.quadrant.toUpperCase()}</div>
                        </div>
                    </div>
                </div>
            );
        }

        function RRGChart({ stocks, highlightTicker }) {
            const MX = px(X_MID), MY = py(Y_MID);
            const R = 11;
            const conv = getConvergence(stocks);
            const qC = { improving:{x:(P+MX)/2, y:(P+MY)/2}, leading:{x:(MX+CW-P)/2, y:(P+MY)/2}, lagging:{x:(P+MX)/2, y:(MY+CH-P)/2}, weakening:{x:(MX+CW-P)/2, y:(MY+CH-P)/2} };

            return (
                <svg viewBox={`0 0 ${CW} ${CH}`} width="100%" style={{ display: "block" }}>
                    <defs>
                        {stocks.map(s => (
                            <linearGradient key={`g-${s.ticker}`} id={`g-${s.ticker}`} x1={px(s.trail?.[0]?.x || s.rs)} y1={py(s.trail?.[0]?.y || s.momentum)} x2={px(s.rs)} y2={py(s.momentum)} gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stopColor={Q_FILL[s.quadrant]} stopOpacity="0" />
                                <stop offset="50%" stopColor={Q_FILL[s.quadrant]} stopOpacity="0.4" />
                                <stop offset="100%" stopColor={Q_FILL[s.quadrant]} stopOpacity="1" />
                            </linearGradient>
                        ))}
                        {stocks.map(s => (
                            <marker key={`m-${s.ticker}`} id={`m-${s.ticker}`} markerWidth="10" markerHeight="5" refX="9" refY="2.5" orient="auto">
                                <polygon points="0 0.6,9 2.5,0 4.4" fill={Q_FILL[s.quadrant]} />
                            </marker>
                        ))}
                        <radialGradient id="cross-grad" cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="#fff" stopOpacity="0.6"/><stop offset="100%" stopColor="#fff" stopOpacity="0"/></radialGradient>
                    </defs>

                    <rect x={P} y={P} width={MX-P} height={MY-P} fill="rgba(96,165,250,0.06)" />
                    <rect x={MX} y={P} width={CW-P-MX} height={MY-P} fill="rgba(34,197,94,0.06)" />
                    <rect x={P} y={MY} width={MX-P} height={CH-P-MY} fill="rgba(239,68,68,0.06)" />
                    <rect x={MX} y={MY} width={CW-P-MX} height={CH-P-MY} fill="rgba(245,158,11,0.06)" />

                    {Object.entries(conv).map(([q, n]) => n > 0 && (
                        <text key={`c-${q}`} x={qC[q].x} y={qC[q].y} fill={Q_FILL[q]} fontSize="11" fontWeight="900" opacity="0.4" textAnchor="middle">{n} →</text>
                    ))}

                    <line x1={MX} y1={P} x2={MX} y2={CH-P} stroke="#1e293b" strokeWidth="1.2" strokeDasharray="5,4" />
                    <line x1={P} y1={MY} x2={CW-P} y2={MY} stroke="#1e293b" strokeWidth="1.2" strokeDasharray="5,4" />
                    
                    <text x={P+8} y={P+18} fill="#60a5fa" fontSize="10" fontWeight="900" opacity="0.8">IMPROVING</text>
                    <text x={CW-P-8} y={P+18} fill="#22c55e" fontSize="10" fontWeight="900" opacity="0.8" textAnchor="end">LEADING</text>
                    <text x={P+8} y={CH-P-8} fill="#ef4444" fontSize="10" fontWeight="900" opacity="0.8">LAGGING</text>
                    <text x={CW-P-8} y={CH-P-8} fill="#f59e0b" fontSize="10" fontWeight="900" opacity="0.8" textAnchor="end">WEAKENING</text>

                    {stocks.map(s => {
                        const h = [...(s.trail || []), { x: s.rs, y: s.momentum }];
                        const pts = h.map(p => ({ x: px(p.x), y: py(p.y) }));
                        const polyStr = pts.map(p => `${p.x},${p.y}`).join(" ");
                        const cx = px(s.rs), cy = py(s.momentum);
                        const cur = trailCurvature(h);
                        const isV = cur > 26;
                        const str = Math.min(1, (s.streak || 0) / 10);
                        const prev = pts[pts.length-2] || pts[0];
                        const ddx = cx-prev.x, ddy = cy-prev.y;
                        const dl = Math.hypot(ddx,ddy)||1; const ux=ddx/dl, uy=ddy/dl;
                        const aH = {x: cx+ux*(R+2), y: cy+uy*(R+2)}, aT = {x: aH.x+ux*30, y: aH.y+uy*30};

                        return (
                            <g key={s.ticker} style={{ cursor: "pointer" }}>
                                {isV && <circle cx={cx} cy={cy} r={R+9} fill="none" stroke="#f59e0b" strokeWidth="1" strokeDasharray="3,3" opacity="0.6"><animateTransform attributeName="transform" type="rotate" from={`0 ${cx} ${cy}`} to={`360 ${cx} ${cy}`} dur="4s" repeatCount="indefinite" /></circle>}
                                <polyline points={polyStr} fill="none" stroke={Q_FILL[s.quadrant]} strokeWidth="10" strokeLinecap="round" opacity="0.04" />
                                <polyline points={polyStr} fill="none" stroke={`url(#g-${s.ticker})`} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" opacity="0.9" />
                                {pts.slice(0,-1).map((p,i)=>(<circle key={i} cx={p.x} cy={p.y} r={1.6} fill={Q_FILL[s.quadrant]} opacity={0.3+i*0.1} />))}
                                <line x1={aH.x} y1={aH.y} x2={aT.x} y2={aT.y} stroke={Q_FILL[s.quadrant]} strokeWidth="1.2" markerEnd={`url(#m-${s.ticker})`} opacity="0.8" />
                                <circle cx={cx} cy={cy} r={R+2.5} fill="none" stroke={Q_FILL[s.quadrant]} strokeWidth="1.8" opacity="0.45" strokeDasharray={`${(str*2*Math.PI*(R+2.5)).toFixed(1)} 999`} />
                                {highlightTicker === s.ticker && <circle cx={cx} cy={cy} r={R+6} fill="none" stroke="#fff" strokeWidth="1.5" opacity="0.6" />}
                                <circle cx={cx} cy={cy} r={R} fill={Q_FILL[s.quadrant]} stroke="#0a1120" strokeWidth="1" />
                                <text x={cx} y={cy+0.5} textAnchor="middle" dominantBaseline="middle" fill="#04091a" fontSize="7.5" fontWeight="900" fontFamily="monospace">{s.ticker}</text>
                            </g>
                        );
                    })}

                    {stocks.map(s => axisCrossings([...(s.trail||[]), {x:s.rs, y:s.momentum}]).map((c,i)=>(
                        <g key={s.ticker+"p"+i}>
                            <circle cx={px(c.x)} cy={py(c.y)} r={8} fill="url(#cross-grad)"><animate attributeName="r" values="3;10;3" dur="2s" repeatCount="indefinite" /></circle>
                            <circle cx={px(c.x)} cy={py(c.y)} r={2} fill="#fff" opacity="0.8" />
                        </g>
                    )))}
                </svg>
            );
        }

        function SignalPanel({ stocks, onHover }) {
            const leaders = stocks.filter(s=>s.quadrant==='leading').slice(0,4);
            const vortex = stocks.filter(s=>trailCurvature([...(s.trail||[]),{x:s.rs,y:s.momentum}])>26).slice(0,4);
            return (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 10 }}>
                    <div style={{ background: "#0a1120", border: "1px solid #1e293b", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ fontSize: 9, color: "#475569", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 6 }}>🚀 Velocity Leaders</div>
                        {leaders.map(s=>(<div key={s.ticker} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }} onMouseEnter={()=>onHover(s.ticker)} onMouseLeave={()=>onHover(null)}><div style={{ width:7, height:7, borderRadius:"50%", background:"#22c55e" }} /><span style={{ fontSize:10, color:"#22c55e", fontWeight:700 }}>{s.ticker}</span><span style={{ fontSize:9, color:"#475569" }}>{s.rs} RS / {s.momentum>0?"+":""}{s.momentum.toFixed(1)}</span></div>))}
                    </div>
                    <div style={{ background: "#0a1120", border: "1px solid #1e293b", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ fontSize: 9, color: "#475569", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 6 }}>↻ Vortex Signals</div>
                        {vortex.map(s=>(<div key={s.ticker} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }} onMouseEnter={()=>onHover(s.ticker)} onMouseLeave={()=>onHover(null)}><div style={{ width:7, height:7, borderRadius:"50%", background:"#f59e0b" }} /><span style={{ fontSize:10, color:"#f59e0b", fontWeight:700 }}>{s.ticker}</span><span style={{ fontSize:9, color:"#475569" }}>Trend Reversal</span></div>))}
                    </div>
                </div>
            )
        }

        function App() {
            const [data, setData] = useState([]);
            const [hovered, setHovered] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const load = async () => {
                    try {
                        const [resMain, resHistory] = await Promise.all([fetch('web_data.json'), fetch('stock_history.json')]);
                        const webData = await resMain.json();
                        const history = await resHistory.json();
                        const processed = (webData.all_stocks || []).slice(0, 40).map(s => {
                            const h = history[s.ticker] || [];
                            const curRS = h[0] !== undefined ? h[0] : s.rs;
                            const prevRS = h[7] !== undefined ? h[7] : (s.rs_1w_pct || s.rs);
                            const momentum = curRS - prevRS;
                            let quadrant = curRS >= 85 ? (momentum >= 0 ? "leading" : "weakening") : (momentum >= 0 ? "improving" : "lagging");
                            let streak = 0;
                            for (let i=0; i<Math.max(0, h.length-7); i++) {
                                const tR = h[i], tP = h[i+7], tM = tR - tP;
                                let tQ = tR >= 85 ? (tM >= 0 ? "leading" : "weakening") : (tM >= 0 ? "improving" : "lagging");
                                if (tQ === quadrant) streak++; else break;
                            }
                            const trail = h.slice(0, 9).reverse().map((v, idx) => {
                                const realIdx = 8 - idx;
                                const pV = h[realIdx + 7] !== undefined ? h[realIdx + 7] : v;
                                return { x: v, y: v - pV };
                            });
                            return { ...s, rs: curRS, momentum, quadrant, streak, trail };
                        });
                        setData(processed); setLoading(false);
                    } catch (e) { console.error(e); setLoading(false); }
                };
                load();
            }, []);

            if (loading) return <div style={{ color: "#fff", textAlign: "center", padding: 100, fontFamily: "monospace", fontSize: 13 }}>ENGINE STARTING v2.5...</div>;
            const promising = data.filter(s => s.quadrant === 'leading' || s.quadrant === 'improving').sort((a,b) => b.rs - a.rs);

            return (
                <div className="container">
                    <div style={{ marginBottom: 18 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                            <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#00e5ff", boxShadow: "0 0 7px #00e5ff" }} />
                            <span style={{ fontSize: 10, color: "#00e5ff", letterSpacing: "0.2em" }}>STOCK ROTATION REAL-TIME • ENGINEERING FIDELITY</span>
                        </div>
                        <h1 style={{ margin: 0, fontSize: 20, fontWeight: 900, color: "#f1f5f9" }}>Relative Strength Rotation</h1>
                    </div>
                    
                    <TickerBanner stocks={promising} />

                    <div className="card" style={{ padding: "14px" }}>
                        <div style={{ background: "#0a1120", borderRadius: 8, border: "1px solid #1e293b" }}>
                            <RRGChart stocks={data.slice(0, 30)} highlightTicker={hovered} />
                        </div>
                        <SignalPanel stocks={data} onHover={setHovered} />
                        <SymbolSpotlight stocks={promising} />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
