<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Sector Rotation - Rajesh's Stock Screener</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- React & Recharts Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts/umd/Recharts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg: #06060f;--bg2: #0d0d1a;--surface: rgba(255, 255, 255, .04);--border: rgba(255, 255, 255, .08);
            --text: #e4e4ef;--text2: #8888a8;--accent: #6c5ce7;--accent2: #a29bfe;--cyan: #00e5ff;
            --font: 'Outfit', system-ui, sans-serif;--mono: 'JetBrains Mono', monospace;
        }
        html, body { width: 100%; margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, BarChart, Bar, Cell, ReferenceLine } = Recharts;

        let SECTORS = [];
        const Q_FILL = { leading:"#22c55e", weakening:"#f59e0b", lagging:"#ef4444", improving:"#60a5fa" };
        const CW=350, CH=350, P=30;

        function px(v){ return P + ((v-96)/8)*(CW-P*2); }
        function py(v){ return (CH-P) - ((v-96)/8)*(CH-P*2); }

        function TickerBanner() {
          return (
            <div style={{height:30, background:"rgba(0,0,0,0.3)", borderTop:"1px solid var(--border)", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", overflow:"hidden", marginBottom:15}}>
              <div style={{display:"flex", whiteSpace:"nowrap", animation:"scroll 40s linear infinite"}}>
                {[...SECTORS, ...SECTORS].map((s,i) => (
                  <span key={i} style={{paddingRight:30, fontSize:10, fontWeight:700, fontFamily: "var(--mono)", color: Q_FILL[s.q]}}>
                    {s.name} <span style={{color:"#475569"}}>{s.x.toFixed(1)}</span>
                  </span>
                ))}
              </div>
              <style>{`@keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }`}</style>
            </div>
          );
        }

        function RRGChart() {
          const MX=px(100), MY=py(100);
          return (
            <svg viewBox={"0 0 "+CW+" "+CH} width="100%" style={{display:"block"}}>
              <defs>
                {SECTORS.map(s => (
                  <marker key={"m"+s.name} id={"m"+s.name} markerWidth="10" markerHeight="5" refX="9" refY="2.5" orient="auto">
                    <polygon points="0 0.6,9 2.5,0 4.4" fill={Q_FILL[s.q]}/>
                  </marker>
                ))}
              </defs>
              <rect x={P} y={P} width={MX-P} height={MY-P} fill="rgba(96,165,250,0.05)"/><rect x={MX} y={P} width={CW-P-MX} height={MY-P} fill="rgba(34,197,94,0.05)"/><rect x={P} y={MY} width={MX-P} height={CH-P-MY} fill="rgba(239,68,68,0.05)"/><rect x={MX} y={MY} width={CW-P-MX} height={CH-P-MY} fill="rgba(245,158,11,0.05)"/>
              <line x1={MX} y1={P} x2={MX} y2={CH-P} stroke="#1e293b" strokeWidth="1" strokeDasharray="5,4"/><line x1={P} y1={MY} x2={CW-P} y2={MY} stroke="#1e293b" strokeWidth="1" strokeDasharray="5,4"/>
              
              {SECTORS.map(s => {
                const curX=px(s.x), curY=py(s.y);
                const path=[...(s.trail||[]), {x:s.x,y:s.y}];
                const polyStr=path.map(p=>px(p.x)+","+py(p.y)).join(" ");
                const prev = path[path.length-2] || path[0];
                const vX = curX - px(prev.x), vY = curY - py(prev.y);

                return (
                  <g key={s.name}>
                    <polyline points={polyStr} fill="none" stroke={Q_FILL[s.q]} strokeWidth="1.5" strokeOpacity="0.4" strokeLinecap="round" strokeLinejoin="round"/>
                    {path.slice(0,-1).map((p,i)=>(<circle key={i} cx={px(p.x)} cy={py(p.y)} r="1.5" fill={Q_FILL[s.q]} opacity={0.1+i*0.15}/>))}
                    <line x1={curX} y1={curY} x2={curX+vX*1.5} y2={curY+vY*1.5} stroke={Q_FILL[s.q]} strokeWidth="1.2" markerEnd={"url(#m"+s.name+")"}/>
                    <circle cx={curX} cy={curY} r="9" fill={Q_FILL[s.q]} stroke="#000" strokeWidth="1"/>
                    <text x={curX} y={curY+0.4} textAnchor="middle" dominantBaseline="middle" fill="#000" fontSize="7" fontWeight="800">{s.name}</text>
                  </g>
                );
              })}
            </svg>
          );
        }

        function App() {
          const [data, setData] = useState(null);
          useEffect(() => {
            fetch('web_data.json').then(r=>r.json()).then(d=>{ setData(d); SECTORS = d.sectors || []; });
          }, []);

          if (!data) return <div style={{padding:20}}>Loading Analysis...</div>;

          return (
            <div style={{background:"#070d1a", minHeight:"100vh", padding:"20px 15px"}}>
              <div style={{marginBottom:18}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:"#22d3ee",boxShadow:"0 0 7px #22d3ee"}}/>
                  <span style={{fontSize:10,color:"#22d3ee",letterSpacing:"0.2em",textTransform:"uppercase"}}>Live Analysis</span>
                </div>
                <h1 style={{margin:0,fontSize:20,fontWeight:700,color:"#f1f5f9"}}>Sector Rotation</h1>
              </div>
              
              <TickerBanner />

              <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:"13px 12px",marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:10}}>Relative Rotation Graph</div>
                <div style={{background:"#0a1120",borderRadius:8,border:"1px solid #1e293b"}}>
                    <RRGChart />
                </div>
              </div>

              <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,padding:"12px 13px"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",marginBottom:8}}>Signal Matrix</div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                    <thead><tr style={{color:"#475569",borderBottom:"1px solid #1e293b"}}><th style={{textAlign:"left"}}>Sector</th><th style={{textAlign:"left"}}>Quadrant</th><th style={{textAlign:"left"}}>Status</th></tr></thead>
                    <tbody>{SECTORS.map(s => (
                        <tr key={s.name} style={{borderBottom:"1px solid #1e293b"}}>
                            <td style={{padding:"6px 0",fontWeight:700,color:Q_FILL[s.q]}}>{s.name}</td>
                            <td style={{color:Q_FILL[s.q]}}>{s.q}</td>
                            <td style={{color:s.y>=100?"#22c55e":"#ef4444"}}>{s.y>=100?"STRENGTH":"WEAKNESS"}</td>
                        </tr>
                    ))}</tbody>
                </table>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
