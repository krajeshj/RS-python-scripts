<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Stock Rotation Map - Rajesh's Stock Screener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06060f; --bg2: #0d0d1a; --surface: rgba(255, 255, 255, .04); --border: rgba(255, 255, 255, .08);
            --text: #e4e4ef; --text2: #8888a8; --accent: #6c5ce7; --accent2: #a29bfe; --cyan: #00e5ff;
            --green: #00e676; --orange: #ff9100; --red: #ff5252;
            --q-leading: #22c55e; --q-weakening: #f59e0b; --q-lagging: #ef4444; --q-improving: #60a5fa;
            --font: 'Outfit', system-ui, sans-serif; --mono: 'JetBrains Mono', monospace;
            --glass: rgba(18,18,40,.72); --glass-b: 12px; --radius: 16px; --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0,0,0,.45);
        }
        html, body { width: 100%; margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden;
            background-image: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(108,92,231,.12), transparent);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        header { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 1000; width: 100%; background: rgba(6, 6, 15, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 1rem 0; }
        .logo-icon { font-size: 2.5rem; color: var(--cyan); margin-bottom: 4px; filter: drop-shadow(0 0 10px rgba(0,229,255,0.3)); }
        h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--text) 30%, var(--accent2)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 1rem; margin: 0.5rem 0; flex-wrap: wrap; justify-content: center; }
        .nav-link { color: var(--text2); text-decoration: none; font-weight: 600; font-size: 0.85rem; padding: 6px 16px; border-radius: 20px; transition: all 0.3s ease; border: 1px solid transparent; }
        .nav-link.active { color: var(--cyan); background: rgba(0, 229, 255, 0.1); border-color: rgba(0, 229, 255, 0.2); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 15px; }

        .dashboard-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1.5rem; background: var(--surface); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); }
        .slider-group { display: flex; flex-direction: column; gap: 4px; min-width: 200px; }
        .slider-group label { font-size: 0.82rem; font-weight: 600; color: var(--text2); }
        .slider-val { color: var(--cyan); font-family: var(--mono); font-weight: 700; }
        .dual-range-container { position: relative; height: 20px; width: calc(100% - 18px); margin: 0 9px; }
        .dual-range-bg { position: absolute; height: 6px; width: 100%; background: var(--border); border-radius: 3px; top: 6px; }
        .dual-range-fill { position: absolute; height: 6px; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 3px; top: 6px; }
        .dual-range { position: absolute; width: 100%; pointer-events: none; -webkit-appearance: none; background: none; top: 0; left: 0; outline: none; }
        .dual-range::-webkit-slider-thumb { pointer-events: auto; -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--cyan); cursor: pointer; border: 2px solid var(--surface); box-shadow: 0 0 10px rgba(0,229,255,0.3); }
        .toggle-btn { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 7px 14px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 0.8rem; font-weight: 600; transition: all 0.2s; user-select: none; }
        .toggle-btn.active { background: rgba(0,230,118,0.1); border-color: var(--green); color: var(--green); }
        .toggle-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text2); transition: all 0.2s; }
        .toggle-btn.active .toggle-dot { background: var(--green); box-shadow: 0 0 8px rgba(0,230,118,0.5); }

        .rrg-box { background: #0a1120; border: 1px solid #1e293b; border-radius: 12px; position: relative; width: 100%; aspect-ratio: 1.5/1; box-shadow: var(--shadow); overflow: hidden; }
        svg { width: 100%; height: 100%; display: block; }
        .stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; margin-top: 30px; }
        .stock-card { background: var(--glass); backdrop-filter: blur(var(--glass-b)); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; transition: all 0.3s; position: relative; }
        .stock-card:hover { border-color: var(--accent); transform: translateY(-4px); }
        .ticker { font-size: 1.5rem; font-weight: 800; color: var(--cyan); letter-spacing: -0.02em; font-family: var(--mono); text-decoration: none; }
        .company-name { font-size: 0.8rem; color: var(--text2); }
        .meta-info { font-size: 0.75rem; color: var(--text2); }
        .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; background: var(--surface); padding: 10px; border-radius: var(--radius-sm); }
        .metric { display: flex; flex-direction: column; }
        .metric-label { font-size: 0.55rem; color: var(--text2); text-transform: uppercase; font-weight: 600; }
        .metric-value { font-size: 0.95rem; font-weight: 700; color: var(--text); font-family: var(--mono); }
        .chart-link { display: block; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); background: #000; height: 140px; }
        .chart-img { width: 100%; height: 100%; object-fit: contain; }
        .q-toggles { display: flex; gap: 15px; margin-bottom: 25px; background: var(--surface); padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); justify-content: center; }
        .q-label { font-size: 0.85rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-icon">💹</div>
        <h1>Stock Rotation Map</h1>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard 🚀</a>
            <a href="stages.html" class="nav-link">Sector Analysis 🏗️</a>
            <a href="industries.html" class="nav-link">Industry Momentum 📊</a>
            <a href="quick_scan.html" class="nav-link">Quick Scan ⚡</a>
            <a href="rotation.html" class="nav-link">Sector Rotation 🔄</a>
            <a href="stock_rotation.html" class="nav-link active">Stock Rotation 💹</a>
        </div>
    </header>

    <div class="container">
        <!-- Dashboard Filter Suite -->
        <div class="dashboard-tools">
            <div class="slider-group">
                <label>RS Range: <span id="rs-min-val" class="slider-val">75</span> - <span id="rs-max-val" class="slider-val">100</span></label>
                <div class="dual-range-container">
                    <div class="dual-range-bg"></div>
                    <div id="rs-fill" class="dual-range-fill"></div>
                    <input type="range" id="rs-min-slider" min="50" max="100" value="75" class="dual-range">
                    <input type="range" id="rs-max-slider" min="50" max="100" value="100" class="dual-range">
                </div>
            </div>
            <div class="slider-group">
                <label>RMV Range: <span id="rmv-min-val" class="slider-val">10</span> - <span id="rmv-max-val" class="slider-val">45</span></label>
                <div class="dual-range-container">
                    <div class="dual-range-bg"></div>
                    <div id="rmv-fill" class="dual-range-fill"></div>
                    <input type="range" id="rmv-min-slider" min="0" max="100" value="10" class="dual-range">
                    <input type="range" id="rmv-max-slider" min="0" max="100" value="45" class="dual-range">
                </div>
            </div>
            <div id="quality-btn" class="toggle-btn active" onclick="toggleFilter('quality')">
                <div class="toggle-dot"></div>🛡️ Quality
            </div>
            <div id="minervini-btn" class="toggle-btn" onclick="toggleFilter('minervini')">
                <div class="toggle-dot"></div>🌟 Minervini
            </div>
            <div id="top5-btn" class="toggle-btn" onclick="toggleFilter('top5')">
                <div class="toggle-dot"></div>🏆 Top 5 Sectors
            </div>
        </div>

        <!-- Quadrant Filters (Styled like Sector Rotation) -->
        <div class="q-toggles">
            <label class="q-label" style="color: var(--q-leading);"><input type="checkbox" id="q-leading" checked onchange="render()"> Leading</label>
            <label class="q-label" style="color: var(--q-improving);"><input type="checkbox" id="q-improving" checked onchange="render()"> Improving</label>
            <label class="q-label" style="color: var(--q-weakening);"><input type="checkbox" id="q-weakening" checked onchange="render()"> Weakening</label>
            <label class="q-label" style="color: var(--q-lagging);"><input type="checkbox" id="q-lagging" checked onchange="render()"> Lagging</label>
            <span id="filter-status" style="margin-left:auto; font-size:0.75rem; color:var(--text2); font-weight:700;">Loading...</span>
        </div>

        <div class="rrg-box" id="rrg-container">
            <div style="padding:100px; text-align:center;">Analyzing Universe...</div>
        </div>

        <div class="stock-grid" id="stock-grid"></div>
    </div>

    <script>
        var webData = null, stockHist = null, allStocks = [];
        var minRS = 75, maxRS = 100, minRMV = 10, maxRMV = 45;
        var filters = { quality: true, minervini: false, top5: false };
        var Q_FILL = { leading: '#22c55e', weakening: '#f59e0b', lagging: '#ef4444', improving: '#60a5fa' };

        function median(arr) {
            var s = arr.slice().sort((a,b) => a-b);
            if(!s.length) return 0;
            var m = Math.floor(s.length/2);
            return s.length % 2 ? s[m] : (s[m-1] + s[m])/2;
        }

        function init() {
            var ts = Date.now();
            updateSliderUI();
            Promise.all([
                fetch('web_data.json?v=' + ts).then(r => r.json()),
                fetch('stock_history.json?v=' + ts).then(r => r.json())
            ]).then(res => {
                webData = res[0]; stockHist = res[1] || {};
                var raw = (webData.stocks||[]).concat(webData.pulse||[]).concat(webData.all_stocks||[]);
                var unq = {};
                raw.forEach(s => { if(!unq[s.ticker] || s.rs > unq[s.ticker].rs) unq[s.ticker] = s; });
                allStocks = Object.keys(unq).map(k => unq[k]);
                
                // Slider Listeners
                document.getElementById('rs-min-slider').addEventListener('input', e => { minRS = Math.min(+e.target.value, maxRS-1); e.target.value = minRS; updateSliderUI(); render(); });
                document.getElementById('rs-max-slider').addEventListener('input', e => { maxRS = Math.max(+e.target.value, minRS+1); e.target.value = maxRS; updateSliderUI(); render(); });
                document.getElementById('rmv-min-slider').addEventListener('input', e => { minRMV = Math.min(+e.target.value, maxRMV-1); e.target.value = minRMV; updateSliderUI(); render(); });
                document.getElementById('rmv-max-slider').addEventListener('input', e => { maxRMV = Math.max(+e.target.value, minRMV+1); e.target.value = maxRMV; updateSliderUI(); render(); });

                render();
            }).catch(e => { 
                console.error(e);
                document.getElementById('rrg-container').innerHTML = '<div style="padding:100px;text-align:center;color:red;">Data Load Error. Check Console.</div>'; 
            });
        }

        function toggleFilter(k) { filters[k] = !filters[k]; document.getElementById(k+'-btn').classList.toggle('active', filters[k]); render(); }
        
        function updateSliderUI() {
            var rsF = document.getElementById('rs-fill');
            if(rsF) { rsF.style.left = ((minRS - 50) * 2) + '%'; rsF.style.right = (100 - (maxRS - 50) * 2) + '%'; }
            document.getElementById('rs-min-val').textContent = minRS; document.getElementById('rs-max-val').textContent = maxRS;

            var rmvF = document.getElementById('rmv-fill');
            if(rmvF) { rmvF.style.left = minRMV + '%'; rmvF.style.right = (100 - maxRMV) + '%'; }
            document.getElementById('rmv-min-val').textContent = minRMV; document.getElementById('rmv-max-val').textContent = maxRMV;
        }

        function render() {
            if(!webData || !allStocks.length) return;
            var topSectors = (filters.top5 && webData.stages) ? webData.stages.slice(0,5).map(s => s.sector) : [];
            
            var pool = allStocks.filter(s => {
                if(s.rs < minRS || s.rs > maxRS) return false;
                if(s.rmv < minRMV || s.rmv > maxRMV) return false;
                if(filters.quality && s.is_speculative) return false;
                if(filters.minervini && !s.is_minervini) return false;
                if(filters.top5 && topSectors.length && !top5Sectors.includes(s.sector)) return false;
                return true;
            });

            // Using rs_raw for centering logic to get high-fidelity spread
            var universeRS = pool.map(s => s.rs_raw || s.rs || 0);
            var medRS = median(universeRS) || 50;
            
            var universeMom = pool.map(s => {
                var h = (stockHist[s.ticker] || []).slice(-5);
                var avgH = h.length ? (h.reduce((a,b)=>a+b,0)/h.length) : (s.rs_raw||s.rs||0);
                return ((s.rs_raw || s.rs || 0) - avgH) * 50;
            });
            var medMom = median(universeMom) || 0;

            pool.sort((a,b) => b.rs - a.rs);
            var top40 = pool.slice(0, 40);

            var candidates = top40.map(s => {
                var h = (stockHist[s.ticker] || []).slice(-15);
                var curRS = s.rs_raw || s.rs || 0;
                var x = curRS - medRS; 
                
                var recentArr = h.slice(-5);
                var avgRecent = recentArr.length ? (recentArr.reduce((a,b)=>a+b,0)/recentArr.length) : curRS;
                var y = ((curRS - avgRecent) * 50) - medMom;

                var q = x >= 0 ? (y >= 0 ? 'leading' : 'weakening') : (y >= 0 ? 'improving' : 'lagging');
                var trail = [];
                for(var i=0; i<h.length; i++) {
                    var trVal = h[i];
                    var window = h.slice(Math.max(0, i-4), i+1);
                    var trAvg = window.reduce((a,b)=>a+b,0)/window.length;
                    trail.push({ x: trVal - medRS, y: ((trVal - trAvg) * 50) - medMom });
                }
                return { s, x, y, q, trail };
            });

            var qVis = {
                leading: document.getElementById('q-leading').checked,
                improving: document.getElementById('q-improving').checked,
                weakening: document.getElementById('q-weakening').checked,
                lagging: document.getElementById('q-lagging').checked
            };
            var visible = candidates.filter(c => qVis[c.q]);
            document.getElementById('filter-status').textContent = visible.length + ' shown of ' + pool.length + ' filtered';

            renderSVG(visible);
            renderGrid(visible);
        }

        function renderSVG(data) {
            var container = document.getElementById('rrg-container');
            if(!data.length) { container.innerHTML = '<div style="padding:100px;text-align:center;">No results match selection.</div>'; return; }
            
            var CW=900, CH=600, P=60;
            var allX = [], allY = [];
            data.forEach(d => {
                if(!isNaN(d.x)) allX.push(d.x); if(!isNaN(d.y)) allY.push(d.y);
                d.trail.forEach(t => { if(!isNaN(t.x)) allX.push(t.x); if(!isNaN(t.y)) allY.push(t.y); });
            });
            
            var maxAbsX = Math.max(...allX.map(Math.abs), 1) * 1.2;
            var maxAbsY = Math.max(...allY.map(Math.abs), 1) * 1.2;
            if (maxAbsX < 0.5) maxAbsX = 2; // Prevent infinite zoom
            if (maxAbsY < 0.5) maxAbsY = 2;

            var tX = v => (CW/2) + (v/maxAbsX)*(CW/2 - P);
            var tY = v => (CH/2) - (v/maxAbsY)*(CH/2 - P);
            var MX = tX(0), MY = tY(0);

            var svgContent = '<rect width="100%" height="100%" fill="#0b0e14"/>';
            svgContent += '<rect x="'+P+'" y="'+P+'" width="'+(MX-P)+'" height="'+(MY-P)+'" fill="#1a2530"/>' + // Improving
                          '<rect x="'+MX+'" y="'+P+'" width="'+(CW-P-MX)+'" height="'+(MY-P)+'" fill="#152b28"/>' + // Leading
                          '<rect x="'+P+'" y="'+MY+'" width="'+(MX-P)+'" height="'+(CH-P-MY)+'" fill="#2d1a20"/>' + // Lagging
                          '<rect x="'+MX+'" y="'+MY+'" width="'+(CW-P-MX)+'" height="'+(CH-P-MY)+'" fill="#2c2214"/>'; // Weakening
            
            for(var i=1;i<10;i++) {
                var gX = P + (i/10)*(CW-P*2); var gY = P + (i/10)*(CH-P*2);
                svgContent += '<line x1="'+gX+'" y1="'+P+'" x2="'+gX+'" y2="'+(CH-P)+'" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>';
                svgContent += '<line x1="'+P+'" y1="'+gY+'" x2="'+(CW-P)+'" y2="'+gY+'" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>';
            }
            svgContent += '<line x1="'+MX+'" y1="'+P+'" x2="'+MX+'" y2="'+(CH-P)+'" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>';
            svgContent += '<line x1="'+P+'" y1="'+MY+'" x2="'+(CW-P)+'" y2="'+MY+'" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>';

            svgContent += '<text x="'+(P+10)+'" y="'+(P+20)+'" fill="#60a5fa" font-size="11" font-weight="900" opacity="0.6">IMPROVING</text>' +
                          '<text x="'+(CW-P-60)+'" y="'+(P+20)+'" fill="#10b981" font-size="11" font-weight="900" opacity="0.6">LEADING</text>' +
                          '<text x="'+(P+10)+'" y="'+(CH-P-15)+'" fill="#ef4444" font-size="11" font-weight="900" opacity="0.6">LAGGING</text>' +
                          '<text x="'+(CW-P-75)+'" y="'+(CH-P-15)+'" fill="#f59e0b" font-size="11" font-weight="900" opacity="0.6">WEAKENING</text>';

            data.forEach(d => {
                var color = Q_FILL[d.q];
                if(d.trail.length > 2) {
                    var pts = d.trail.map(p => tX(p.x).toFixed(1)+','+tY(p.y).toFixed(1)).join(' ');
                    svgContent += '<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>';
                }
                var cx = tX(d.x), cy = tY(d.y);
                svgContent += '<circle cx="'+cx+'" cy="'+cy+'" r="8" fill="'+color+'" stroke="#fff" stroke-width="2"/>';
                svgContent += '<text x="'+(cx+12)+'" y="'+(cy+4)+'" fill="#fff" font-weight="800" font-size="12" style="text-shadow:0 0 5px #000">'+d.s.ticker+'</text>';
            });

            container.innerHTML = '<svg viewBox="0 0 '+CW+' '+CH+'">'+svgContent+'</svg>';
        }

        function renderGrid(data) {
            document.getElementById('stock-grid').innerHTML = data.map(d => {
                var s = d.s, qC = Q_FILL[d.q];
                var outlook = d.y > 0 ? (d.x > 0 ? 'rallying' : 'recovering') : (d.x > 0 ? 'curling' : 'declining');
                var outClass = (outlook==='rallying'||outlook==='recovering') ? 'outlook-rallying' : (outlook==='curling'?'outlook-curling':'outlook-declining');
                return '<div class="stock-card">' +
                    '<div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
                        '<div>' +
                            '<div style="display:flex;align-items:center;gap:8px;"><a href="'+s.tradingview_url+'" target="_blank" class="ticker">'+s.ticker+'</a><span style="font-size:0.65rem;padding:2px 8px;border-radius:4px;background:'+qC+'22;color:'+qC+';border:1px solid '+qC+'44;font-weight:800;">'+d.q.toUpperCase()+'</span></div>' +
                            '<div class="company-name">'+s.name+'</div>' +
                            '<div class="meta-info">'+s.industry+' &bull; '+s.sector+'</div>' +
                        '</div>' +
                        '<div style="text-align:right;"><div style="font-size:0.7rem;color:var(--cyan);font-weight:700;">$'+(s.price?s.price.toFixed(2):'N/A')+'</div><div style="font-size:0.6rem;color:var(--text2);">Rank #'+(s.rank||'N/A')+'</div></div>' +
                    '</div>' +
                    '<a href="'+s.tradingview_url+'" target="_blank" class="chart-link"><img src="'+s.finviz_chart_url+'" class="chart-img" loading="lazy"></a>' +
                    '<div class="metrics">' +
                        '<div class="metric"><span class="metric-label">RS Pct</span><span class="metric-value" style="color:var(--cyan)">'+s.rs+'</span></div>' +
                        '<div class="metric"><span class="metric-label">RMV</span><span class="metric-value">'+(s.rmv?s.rmv.toFixed(1):'N/A')+'</span></div>' +
                        '<div class="metric"><span class="metric-label">1W RS</span><span class="metric-value">'+(s.rs_1w_pct||'N/A')+'</span></div>' +
                        '<div class="metric"><span class="metric-label">1M RS</span><span class="metric-value">'+(s.rs_1m_pct||'N/A')+'</span></div>' +
                    '</div>' +
                    '<div style="border-top:1px solid var(--border);padding-top:10px;"><span class="outlook-tag '+outClass+'">MOMENTUM '+outlook.toUpperCase()+'</span></div>' +
                '</div>';
            }).join('');
        }

        init();
    </script>
</body>
</html>
