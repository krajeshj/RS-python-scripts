<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Stock Rotation - Rajesh's Stock Screener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06060f; --bg2: #0d0d1a; --surface: rgba(255,255,255,.04); --border: rgba(255,255,255,.08);
            --text: #e4e4ef; --text2: #8888a8; --accent: #6c5ce7; --accent2: #a29bfe;
            --green: #00e676; --cyan: #00e5ff; --orange: #ff9100; --red: #ff5252;
            --glass: rgba(18,18,40,.72); --glass-b: 12px; --radius: 16px; --radius-sm: 10px;
            --font: 'Outfit', system-ui, sans-serif; --mono: 'JetBrains Mono', monospace;
            --shadow: 0 8px 32px rgba(0,0,0,.45);
        }
        html, body { width: 100%; margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden;
            background-image: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(108,92,231,.12), transparent), radial-gradient(ellipse 60% 50% at 80% 110%, rgba(0,229,255,.06), transparent);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        header { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 1000; width: 100%; background: rgba(6,6,15,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 1rem 0; }
        .logo-icon { font-size: 2.5rem; color: var(--cyan); margin-bottom: 4px; filter: drop-shadow(0 0 10px rgba(0,229,255,0.3)); }
        h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--text) 30%, var(--accent2)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 1rem; margin: 0.5rem 0; flex-wrap: wrap; justify-content: center; }
        .nav-link { color: var(--text2); text-decoration: none; font-weight: 600; font-size: 0.85rem; padding: 6px 16px; border-radius: 20px; transition: all 0.3s ease; border: 1px solid transparent; }
        .nav-link.active { color: var(--cyan); background: rgba(0,229,255,0.1); border-color: rgba(0,229,255,0.2); }
        .container { max-width: 900px; margin: 0 auto; padding: 20px 15px; }
        .dashboard-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 1rem; }
        .slider-group { display: flex; flex-direction: column; gap: 4px; min-width: 180px; }
        .slider-group label { font-size: 0.82rem; font-weight: 600; color: var(--text2); }
        .slider-val { color: var(--cyan); font-family: var(--mono); font-weight: 700; }
        .dual-range-container { position: relative; height: 20px; width: calc(100% - 18px); margin: 0 9px; touch-action: none; }
        .dual-range-bg { position: absolute; height: 6px; width: 100%; background: var(--border); border-radius: 3px; top: 6px; }
        .dual-range-fill { position: absolute; height: 6px; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 3px; top: 6px; }
        .dual-range { position: absolute; width: 100%; pointer-events: none; appearance: none; -webkit-appearance: none; background: none; top: 0; left: 0; margin: 0; touch-action: none; }
        .dual-range::-webkit-slider-runnable-track { background: none; }
        .dual-range::-webkit-slider-thumb { pointer-events: auto; appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--cyan); cursor: pointer; box-shadow: 0 0 8px rgba(0,229,255,0.4); border: 2px solid var(--surface); position: relative; z-index: 2; }
        .toggle-btn { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 7px 14px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 0.8rem; font-weight: 600; transition: all 0.2s; user-select: none; }
        .toggle-btn:hover { border-color: var(--accent); }
        .toggle-btn.active { background: rgba(0,230,118,0.1); border-color: var(--green); color: var(--green); }
        .toggle-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text2); transition: all 0.2s; }
        .toggle-btn.active .toggle-dot { background: var(--green); box-shadow: 0 0 8px rgba(0,230,118,0.5); }
        .q-btn { padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 800; border: 1px solid; background: transparent; transition: all 0.2s; letter-spacing: 0.04em; }
        .q-btn.active { color: #000 !important; }
        .q-btn[data-q="leading"] { border-color: #22c55e44; color: #22c55e; } .q-btn[data-q="leading"].active { background: #22c55e; }
        .q-btn[data-q="improving"] { border-color: #60a5fa44; color: #60a5fa; } .q-btn[data-q="improving"].active { background: #60a5fa; }
        .q-btn[data-q="weakening"] { border-color: #f59e0b44; color: #f59e0b; } .q-btn[data-q="weakening"].active { background: #f59e0b; }
        .q-btn[data-q="lagging"] { border-color: #ef444444; color: #ef4444; } .q-btn[data-q="lagging"].active { background: #ef4444; }
        .rrg-box { background: #0a1120; border: 1px solid #1e293b; border-radius: 12px; position: relative; width: 100%; aspect-ratio: 1/1; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        svg { width: 100%; height: 100%; display: block; border-radius: 12px; }
        .meta-info { font-size: 0.78rem; color: var(--text2); font-weight: 500; }
        .stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; margin-top: 15px; }
        .stock-card { background: var(--glass); backdrop-filter: blur(var(--glass-b)); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 1rem; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); animation: fadeUp 0.5s ease backwards; position: relative; min-width: 0; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
        .stock-card:hover { border-color: var(--accent); transform: translateY(-4px); background: rgba(18,18,40,.85); box-shadow: 0 12px 40px rgba(0,0,0,.5); }
        .card-delete { position: absolute; top: 10px; right: 10px; background: rgba(255,82,82,0.15); border: 1px solid rgba(255,82,82,0.3); color: var(--red); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.75rem; transition: all 0.2s; z-index: 2; }
        .card-delete:hover { background: rgba(255,82,82,0.3); transform: scale(1.1); border-color: var(--red); }
        .ticker { font-size: 1.5rem; font-weight: 800; color: var(--cyan); letter-spacing: -0.02em; font-family: var(--mono); text-decoration: none; transition: color 0.2s; }
        .ticker:hover { color: var(--accent2); }
        .rs-pct-badge { font-size: 0.65rem; background: rgba(0,229,255,0.1); color: var(--cyan); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(0,229,255,0.2); font-weight: 700; display: inline-block; }
        .company-name { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
        .source-badge { font-size: 0.6rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; opacity: 0.7; }
        .flip-badge { background: rgba(255,215,0,0.15); color: #FFD700; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; border: 1px solid rgba(255,215,0,0.3); text-transform: uppercase; letter-spacing: 0.05em; animation: glow 2s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px rgba(255,215,0,0.2); } 50% { box-shadow: 0 0 15px rgba(255,215,0,0.5); } 100% { box-shadow: 0 0 5px rgba(255,215,0,0.2); } }
        .canslim-tray { display: flex; gap: 4px; margin-top: 4px; }
        .canslim-letter { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 800; border-radius: 4px; background: rgba(255,255,255,0.05); color: var(--text2); border: 1px solid var(--border); }
        .canslim-letter.active { background: var(--green); color: var(--bg); border-color: var(--green); box-shadow: 0 0 10px rgba(0,230,118,0.3); }
        .chart-link { display: block; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); position: relative; background: var(--surface); height: 140px; }
        .chart-overlay { position: absolute; inset: 0; background: rgba(108,92,231,0.2); opacity: 0; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: white; gap: 8px; backdrop-filter: blur(2px); }
        .chart-link:hover .chart-overlay { opacity: 1; }
        .chart-img { width: 100%; height: 100%; object-fit: contain; filter: brightness(0.9) contrast(1.1); transition: transform 0.3s; }
        .chart-link:hover .chart-img { transform: scale(1.05); }
        .earnings-alert { background: rgba(255,145,0,0.1); color: var(--orange); border: 1px solid rgba(255,145,0,0.2); padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 700; display: flex; align-items: center; gap: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.8; } }
        .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; background: var(--surface); padding: 12px; border-radius: var(--radius-sm); }
        .metric { display: flex; flex-direction: column; gap: 2px; }
        .metric-label { font-size: 0.6rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .metric-value { font-size: 1.1rem; font-weight: 700; color: var(--text); font-family: var(--mono); }
        .highlights { display: flex; flex-wrap: wrap; gap: 6px; }
        .highlight-tag { background: rgba(0,229,255,0.05); color: var(--cyan); padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 600; border: 1px solid rgba(0,229,255,0.15); }
        .outlook-tag { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; border: 1px solid; }
        .outlook-rallying { background: rgba(0,230,118,0.1); color: #00e676; border-color: rgba(0,230,118,0.25); }
        .outlook-curling { background: rgba(255,145,0,0.1); color: #ff9100; border-color: rgba(255,145,0,0.25); }
        .outlook-declining { background: rgba(255,82,82,0.1); color: #ff5252; border-color: rgba(255,82,82,0.25); }
        .hidden { display: none !important; }
        @media (max-width: 768px) { .dashboard-tools { flex-direction: column; align-items: stretch; } .slider-group { width: 100%; } .stock-grid { grid-template-columns: 1fr; } .metrics { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <header>
        <div class="logo-icon">📊</div>
        <h1>Rajesh's Stock Screener</h1>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard 🚀</a>
            <a href="stages.html" class="nav-link">Sector Analysis 🏗️</a>
            <a href="industries.html" class="nav-link">Industry Momentum 📊</a>
            <a href="quick_scan.html" class="nav-link">Quick Scan ⚡</a>
            <a href="rotation.html" class="nav-link">Sector Rotation 🔄</a>
            <a href="stock_rotation.html" class="nav-link active">Stock Rotation 💹</a>
        </div>
    </header>

    <div class="container">
        <div class="dashboard-tools">
            <div class="slider-group">
                <label>RS Range: <span id="rs-min-val" class="slider-val">75</span> - <span id="rs-max-val" class="slider-val">100</span></label>
                <div class="dual-range-container">
                    <div class="dual-range-bg"></div>
                    <div id="rs-fill" class="dual-range-fill" style="left: 50%; right: 0%;"></div>
                    <input type="range" id="rs-min-slider" min="50" max="100" value="75" class="dual-range">
                    <input type="range" id="rs-max-slider" min="50" max="100" value="100" class="dual-range">
                </div>
            </div>
            <div class="slider-group">
                <label>RMV Range: <span id="rmv-min-val" class="slider-val">10</span> - <span id="rmv-max-val" class="slider-val">45</span></label>
                <div class="dual-range-container">
                    <div class="dual-range-bg"></div>
                    <div id="rmv-fill" class="dual-range-fill" style="left: 10%; right: 55%;"></div>
                    <input type="range" id="rmv-min-slider" min="0" max="100" value="10" class="dual-range">
                    <input type="range" id="rmv-max-slider" min="0" max="100" value="45" class="dual-range">
                </div>
            </div>
            <div id="quality-btn" class="toggle-btn active" onclick="toggle('quality')"><div class="toggle-dot"></div>🛡️ Quality</div>
            <div id="minervini-btn" class="toggle-btn" onclick="toggle('minervini')"><div class="toggle-dot"></div>🌟 Minervini</div>
            <div id="top5-btn" class="toggle-btn" onclick="toggle('top5')"><div class="toggle-dot"></div>🏆 Top 5 Sectors</div>
            <div id="copy-btn" class="toggle-btn" onclick="copyTickers()"><div class="toggle-dot"></div>📋 Copy Tickers</div>
        </div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; align-items: center;">
            <span style="font-size: 10px; color: var(--text2); font-weight: 700; letter-spacing: 0.1em;">QUADRANT:</span>
            <button class="q-btn active" data-q="leading" onclick="toggleQ(this)">● LEADING</button>
            <button class="q-btn active" data-q="improving" onclick="toggleQ(this)">● IMPROVING</button>
            <button class="q-btn active" data-q="weakening" onclick="toggleQ(this)">● WEAKENING</button>
            <button class="q-btn active" data-q="lagging" onclick="toggleQ(this)">● LAGGING</button>
            <div class="meta-info" id="filter-count" style="margin-left: auto;"></div>
        </div>
        <div class="rrg-box" id="rrg-container"></div>
        <div class="stock-grid" id="stock-grid"></div>
    </div>

    <script>
        var allStocks = [], webData = null, stockHist = {};
        var minRS = 75, maxRS = 100, minRMV = 10, maxRMV = 45;
        var filters = { quality: true, minervini: false, top5: false };
        var activeQuadrants = { leading: true, improving: true, weakening: true, lagging: true };
        var CW = 600, CH = 600, P = 65, R = 15;
        var Q_FILL = { leading: "#22c55e", weakening: "#f59e0b", lagging: "#ef4444", improving: "#60a5fa" };

        function getHiddenTickers() { try { return JSON.parse(localStorage.getItem('hidden_tickers') || '[]'); } catch(e) { return []; } }
        function hideTicker(ticker) { var list = getHiddenTickers(); if (list.indexOf(ticker) === -1) { list.push(ticker); localStorage.setItem('hidden_tickers', JSON.stringify(list)); } render(); }

        function init() {
            var ts = Date.now();
            Promise.all([
                fetch('web_data.json?v=' + ts).then(function(r) { return r.json(); }),
                fetch('stock_history.json?v=' + ts).then(function(r) { return r.json(); })
            ]).then(function(res) {
                webData = res[0]; 
                allStocks = (res[0].all_stocks || []).concat(res[0].stocks || []).concat(res[0].pulse || []);
                var unq = {};
                allStocks.forEach(function(s) { if (!unq[s.ticker] || s.rs > (unq[s.ticker].rs || 0)) unq[s.ticker] = s; });
                allStocks = Object.keys(unq).map(function(k) { return unq[k]; });
                stockHist = res[1].data || res[1] || {};
                
                // Set the horizontal median for RRG (usually 1.0 in RS Ratio models)
                medianX = median(allStocks.map(function(s) { return +(s.rs_raw || 0); })) || 1.0;
                
                wireSliders(); render();
            }).catch(function(e) {
                console.error(e);
                document.getElementById('rrg-container').innerHTML = '<div style="padding:40px;text-align:center;color:red;">Data sync error.</div>';
            });
        }

        function wireSliders() {
            document.getElementById('rs-min-slider').addEventListener('input', function(e) { minRS = Math.min(+e.target.value, maxRS - 1); e.target.value = minRS; document.getElementById('rs-min-val').textContent = minRS; updateFill('rs'); render(); });
            document.getElementById('rs-max-slider').addEventListener('input', function(e) { maxRS = Math.max(+e.target.value, minRS + 1); e.target.value = maxRS; document.getElementById('rs-max-val').textContent = maxRS; updateFill('rs'); render(); });
            document.getElementById('rmv-min-slider').addEventListener('input', function(e) { minRMV = Math.min(+e.target.value, maxRMV - 1); e.target.value = minRMV; document.getElementById('rmv-min-val').textContent = minRMV; updateFill('rmv'); render(); });
            document.getElementById('rmv-max-slider').addEventListener('input', function(e) { maxRMV = Math.max(+e.target.value, minRMV + 1); e.target.value = maxRMV; document.getElementById('rmv-max-val').textContent = maxRMV; updateFill('rmv'); render(); });
        }
        function updateFill(type) {
            if (type === 'rs') { var f = document.getElementById('rs-fill'); f.style.left = ((minRS - 50) * 2) + '%'; f.style.right = (100 - (maxRS - 50) * 2) + '%'; }
            if (type === 'rmv') { var f = document.getElementById('rmv-fill'); f.style.left = minRMV + '%'; f.style.right = (100 - maxRMV) + '%'; }
        }
        function toggle(key) { filters[key] = !filters[key]; document.getElementById(key + '-btn').classList.toggle('active', filters[key]); render(); }
        function toggleQ(btn) { var q = btn.getAttribute('data-q'); activeQuadrants[q] = !activeQuadrants[q]; btn.classList.toggle('active', activeQuadrants[q]); render(); }
        function copyTickers() {
            var cards = document.querySelectorAll('[data-ticker]'); var tickers = [];
            cards.forEach(function(c) { tickers.push(c.getAttribute('data-ticker')); });
            navigator.clipboard.writeText(tickers.join(', ')).then(function() {
                var btn = document.getElementById('copy-btn'); btn.classList.add('active');
                btn.innerHTML = '<div class="toggle-dot"></div> ✅ Copied!';
                setTimeout(function() { btn.classList.remove('active'); btn.innerHTML = '<div class="toggle-dot"></div> 📋 Copy Tickers'; }, 2000);
            });
        }
        function median(arr) { 
            var clean = arr.filter(function(v) { return typeof v === 'number' && !isNaN(v); });
            if (!clean.length) return 0; 
            var s = clean.slice().sort(function(a, b) { return a - b; }); 
            var m = Math.floor(s.length / 2); 
            return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2; 
        }
        function catmullRom2bezier(pts) { var d = ""; if (pts.length === 0) return d; d += "M " + pts[0].x.toFixed(1) + "," + pts[0].y.toFixed(1) + " "; if (pts.length === 1) return d; for (var i = 0; i < pts.length - 1; i++) { var p0 = i === 0 ? pts[0] : pts[i - 1]; var p1 = pts[i]; var p2 = pts[i + 1]; var p3 = i + 2 < pts.length ? pts[i + 2] : p2; var cp1x = p1.x + (p2.x - p0.x) / 6; var cp1y = p1.y + (p2.y - p0.y) / 6; var cp2x = p2.x - (p3.x - p1.x) / 6; var cp2y = p2.y - (p3.y - p1.y) / 6; d += "C " + cp1x.toFixed(1) + "," + cp1y.toFixed(1) + " " + cp2x.toFixed(1) + "," + cp2y.toFixed(1) + " " + p2.x.toFixed(1) + "," + p2.y.toFixed(1) + " "; } return d; }

        function render() {
            var top5Names = [];
            if (filters.top5 && webData && webData.stages && webData.stages.length >= 5) {
                top5Names = webData.stages.slice(0, 5).map(function(s) { return s.sector; });
            }

            var filtered = allStocks.filter(function(s) {
                var rs = s.rs || 0; var rmv = (s.rmv != null) ? s.rmv : -1;
                if (rs < minRS || rs > maxRS) return false;
                if (rmv < minRMV || rmv > maxRMV) return false;
                if (filters.quality && s.is_speculative) return false;
                if (filters.minervini && !s.is_minervini) return false;
                if (filters.top5 && top5Names.length > 0 && top5Names.indexOf(s.sector) === -1) return false;
                if (getHiddenTickers().indexOf(s.ticker) !== -1) return false;
                return true;
            });
            var totalAvailable = filtered.length;
            var universeSize = allStocks.length || 1500;
            
            // 1. PROCESS ALL FILTERED STOCKS
            var processedAll = filtered.map(function(s) {
                var h = (stockHist[s.ticker] || []).slice(0, 20);
                var xRaw = +(s.rs_raw || 0);
                var todayRank = +(s.rank || 0);
                var prevRank = +(h[7] || todayRank);
                
                // Y = CHANGE IN ABSOLUTE RANK 
                // Using 1.5 multiplier to match visual scale of Sector Rotation
                var yVelocity = (prevRank - todayRank) * 1.5;

                var rawTrail = [];
                for (var t = 0; t < 10; t++) {
                    var trRank = +(h[t] || todayRank);
                    // Synthesize RS Raw for the trail using rank-ratio projection
                    var trX = xRaw * ((universeSize + 1 - trRank) / (universeSize + 1 - todayRank));
                    var trPrevRank = +(h[t+1] || trRank);
                    var trY = (trPrevRank - trRank) * 1.5;
                    rawTrail.push({ x: trX, y: trY });
                }
                var trail = rawTrail.reverse(); // oldest to youngest
                
                // Determine Quadrant
                var q = xRaw >= medianX ? (yVelocity >= 0 ? "leading" : "weakening") : (yVelocity >= 0 ? "improving" : "lagging");
                
                return {
                    ticker: s.ticker, name: s.name, rs: s.rs, rs_raw: xRaw, rmv: s.rmv,
                    rank: s.rank, industry: s.industry, sector: s.sector,
                    finviz_chart_url: s.finviz_chart_url, canslim: s.canslim,
                    price: s.price, volume: s.volume, avg_volume: s.avg_volume,
                    is_up: s.is_up, flip: s.flip, source: s.source,
                    highlights: s.highlights, days_to_earnings: s.days_to_earnings, 
                    tradingview_url: s.tradingview_url,
                    xVal: xRaw, yVal: yVelocity, trail: trail,
                    q: q, color: Q_FILL[q]
                };
            });

            // 2. QUADRANT BALANCING: PICK TOP 10 FROM EACH
            var quads = { leading: [], weakening: [], lagging: [], improving: [] };
            processedAll.forEach(function(p) { quads[p.q].push(p); });
            
            var balancedVisible = [];
            ['leading','improving','weakening','lagging'].forEach(function(qName) {
                var sorted = quads[qName].sort(function(a,b) { return b.rs_raw - a.rs_raw; });
                balancedVisible = balancedVisible.concat(sorted.slice(0, 10));
            });

            // Filter by active quadrants toggle
            var visible = balancedVisible.filter(function(s) { return activeQuadrants[s.q]; });
            document.getElementById('filter-count').textContent = visible.length + ' shown (Top 10 per quad / ' + allStocks.length + ' total)';

            if (!visible.length) {
                document.getElementById('rrg-container').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2);">No stocks in selected quadrants.</div>';
                document.getElementById('stock-grid').innerHTML = '';
                return;
            }

            // =====================================================================
            // SVG RENDERING
            // =====================================================================
            // MATCHING SECTOR ROTATION LOGIC: Calculate bounds from only visible stocks
            // to allow the chart to auto-zoom and adjust as filters change.
            var allX = [], allY = [];
            visible.forEach(function(s) {
                allX.push(s.xVal); allY.push(s.yVal);
                s.trail.forEach(function(tp) { allX.push(tp.x || 0); allY.push(tp.y || 0); });
            });

            var maxAbsX = Math.max.apply(null, allX.map(function(v) { return Math.abs(v - medianX); })) || 0.5;
            var maxAbsY = Math.max.apply(null, allY.map(Math.abs)) || 5;

            // Ensure a minimum playable viewport
            if (maxAbsX < 0.2) maxAbsX = 0.2;
            if (maxAbsY < 5.0) maxAbsY = 5.0;

            var tX = function(v) { 
                var val = +v || 0;
                return P + ((val - (medianX - maxAbsX)) / (maxAbsX * 2)) * (CW - P * 2); 
            };
            var tY = function(v) { 
                var val = +v || 0;
                return (CH - P) - ((val + maxAbsY) / (maxAbsY * 2)) * (CH - P * 2); 
            };

            var MX = tX(medianX), MY = tY(0);
            var stockG = '', defs = '';

            visible.forEach(function(s) {
                    var trailPts = s.trail.map(function(tp) { return { x: tX(tp.x), y: tY(tp.y) }; });
                    var jcx = tX(s.xVal), jcy = tY(s.yVal);
                    
                    var dPaths = '';
                    if (trailPts.length >= 2) {
                        for (var i = 0; i < trailPts.length - 1; i++) {
                            var p0 = i === 0 ? trailPts[0] : trailPts[i - 1];
                            var p1 = trailPts[i];
                            var p2 = trailPts[i + 1];
                            var p3 = i + 2 < trailPts.length ? trailPts[i + 2] : p2;
                            var cp1x = p1.x + (p2.x - p0.x) / 6;
                            var cp1y = p1.y + (p2.y - p0.y) / 6;
                            var cp2x = p2.x - (p3.x - p1.x) / 6;
                            var cp2y = p2.y - (p3.y - p1.y) / 6;
                            var segD = "M " + p1.x.toFixed(1) + "," + p1.y.toFixed(1) + " C " + cp1x.toFixed(1) + "," + cp1y.toFixed(1) + " " + cp2x.toFixed(1) + "," + cp2y.toFixed(1) + " " + p2.x.toFixed(1) + "," + p2.y.toFixed(1);
                            var segOp = 0.1 + 0.6 * ((i + 1) / trailPts.length);
                            dPaths += '<path d="' + segD + '" fill="none" stroke="' + s.color + '" stroke-width="2.5" stroke-linecap="round" opacity="' + segOp + '"/>';
                        }
                    }
                    
                    var dots = trailPts.map(function(p, i) {
                        if (i === trailPts.length - 1) return '';
                        var op = 0.1 + 0.9 * (i / trailPts.length);
                        return '<circle cx="'+p.x+'" cy="'+p.y+'" r="2.5" fill="'+s.color+'" opacity="'+op+'"/>';
                    }).join('');

                    var tailX = trailPts.length > 1 ? trailPts[trailPts.length - 2].x : jcx - 1;
                    var tailY = trailPts.length > 1 ? trailPts[trailPts.length - 2].y : jcy - 1;
                    var angle = Math.atan2(jcy - tailY, jcx - tailX) * 180 / Math.PI;
                    var arrow = '<polygon points="-5,-4 7,0 -5,4" fill="' + s.color + '" transform="translate(' + jcx + ',' + jcy + ') rotate(' + angle + ')" />';

                    stockG += '<g>' +
                        dPaths +
                        dots +
                        arrow +
                        '<text x="' + jcx + '" y="' + (jcy - 10) + '" text-anchor="middle" fill="#fff" font-size="8" font-weight="950" font-family="var(--mono)">' + s.ticker + '</text></g>';
            });

            document.getElementById('rrg-container').innerHTML =
                '<svg viewBox="0 0 ' + CW + ' ' + CH + '"><defs>' + defs + '</defs>' +
                '<rect x="' + P + '" y="' + P + '" width="' + (MX - P) + '" height="' + (MY - P) + '" fill="rgba(96,165,250,0.08)"/>' +
                '<rect x="' + MX + '" y="' + P + '" width="' + (CW - P - MX) + '" height="' + (MY - P) + '" fill="rgba(34,197,94,0.08)"/>' +
                '<rect x="' + P + '" y="' + MY + '" width="' + (MX - P) + '" height="' + (CH - P - MY) + '" fill="rgba(239,68,68,0.08)"/>' +
                '<rect x="' + MX + '" y="' + MY + '" width="' + (CW - P - MX) + '" height="' + (CH - P - MY) + '" fill="rgba(245,158,11,0.08)"/>' +
                '<line x1="' + MX + '" y1="' + P + '" x2="' + MX + '" y2="' + (CH - P) + '" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="5,4"/>' +
                '<line x1="' + P + '" y1="' + MY + '" x2="' + (CW - P) + '" y2="' + MY + '" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="5,4"/>' +
                '<text x="' + (P + 10) + '" y="' + (P + 20) + '" fill="#60a5fa" font-size="12" font-weight="900" opacity="0.5">IMPROVING</text>' +
                '<text x="' + (CW - P - 75) + '" y="' + (P + 20) + '" fill="#22c55e" font-size="12" font-weight="900" opacity="0.5">LEADING</text>' +
                '<text x="' + (P + 10) + '" y="' + (CH - P - 10) + '" fill="#ef4444" font-size="12" font-weight="900" opacity="0.5">LAGGING</text>' +
                '<text x="' + (CW - P - 90) + '" y="' + (CH - P - 10) + '" fill="#f59e0b" font-size="12" font-weight="900" opacity="0.5">WEAKENING</text>' +
                '<text x="' + (CW / 2) + '" y="' + (CH - 8) + '" text-anchor="middle" fill="#334155" font-size="9" font-weight="600">← Lower RS Raw — Higher RS Raw →</text>' +
                '<text x="12" y="' + (CH / 2) + '" text-anchor="middle" fill="#334155" font-size="9" font-weight="600" transform="rotate(-90,12,' + (CH / 2) + ')">← 1W Weaker than 1M — 1W Stronger than 1M →</text>' +
                stockG + '</svg>';

            // CARDS
            var cardsHtml = '';
            visible.forEach(function(s, idx) {
                var outlookLabel = s.outlook === 'rallying' ? '➚ Momentum Rallying' :
                    s.outlook === 'curling' ? '⤹ Momentum Curling' :
                    s.outlook === 'declining' ? '↘ Momentum Declining' :
                    s.outlook === 'recovering' ? '↗ Momentum Recovering' : '→ Neutral';
                var outlookClass = (s.outlook === 'rallying' || s.outlook === 'recovering') ? 'outlook-rallying' :
                    s.outlook === 'curling' ? 'outlook-curling' : 'outlook-declining';

                function fmtVol(v) { if (!v) return 'N/A'; if (v >= 1e6) return (v/1e6).toFixed(1)+'M'; if (v >= 1e3) return (v/1e3).toFixed(0)+'K'; return ''+v; }
                var volStyle = 'font-size:0.65rem;color:var(--text2);padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);display:inline-block;';
                if (s.volume > s.avg_volume) {
                    volStyle = s.is_up ?
                        'font-size:0.65rem;font-weight:800;padding:2px 6px;border-radius:4px;border:1px solid rgba(0,230,118,0.3);background:rgba(0,230,118,0.1);color:var(--green);display:inline-block;' :
                        'font-size:0.65rem;font-weight:800;padding:2px 6px;border-radius:4px;border:1px solid rgba(255,145,0,0.3);background:rgba(255,145,0,0.1);color:var(--orange);display:inline-block;';
                }

                var canslimHtml = '';
                if (s.canslim) {
                    var letters = ['C','A','N','S','L','I','M'];
                    canslimHtml = '<div class="canslim-tray">' + letters.map(function(l) {
                        var active = s.canslim[l.toLowerCase()];
                        return '<div class="canslim-letter ' + (active ? 'active' : '') + '" title="' + l + '">' + l + '</div>';
                    }).join('') + '</div>';
                }
                var hiTags = s.highlights ? s.highlights.split(', ').map(function(h) { return '<span class="highlight-tag">' + h + '</span>'; }).join('') : '';

                cardsHtml += '<div class="stock-card" data-ticker="' + s.ticker + '" style="animation-delay:' + (idx*0.05) + 's">' +
                    '<div class="card-delete" onclick="hideTicker(\'' + s.ticker + '\')" title="Hide ' + s.ticker + '">✕</div>' +
                    '<div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
                        '<div>' +
                            '<div style="display:flex;align-items:center;gap:8px;">' +
                                '<a href="' + (s.tradingview_url || '#') + '" target="_blank" class="ticker">' + s.ticker + '</a>' +
                                '<div class="rs-pct-badge">1W: ' + (s.rs_1w_pct || 'N/A') + '%</div>' +
                            '</div>' +
                            '<div class="company-name">' + (s.name || '') + '</div>' +
                            '<div class="meta-info" style="margin-top:4px;font-size:0.75rem;">' + (s.industry || '') + ' &bull; ' + (s.sector || '') + '</div>' +
                            canslimHtml +
                        '</div>' +
                        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding-right:28px;">' +
                            '<div style="font-size:0.7rem;color:var(--text2);opacity:0.8;">#' + (s.rank || '') + '</div>' +
                            '<span style="font-size:0.65rem;padding:2px 8px;border-radius:4px;background:' + s.color + '22;color:' + s.color + ';border:1px solid ' + s.color + '44;font-weight:800;">' + s.q.toUpperCase() + '</span>' +
                            (s.flip ? '<div class="flip-badge">⚡ PRIME FLIP</div>' : '') +
                            '<div class="source-badge" style="margin-bottom:4px;">' + (s.source || '') + '</div>' +
                            '<div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">' +
                                (s.price ? '<div style="' + volStyle + '">$' + s.price.toFixed(2) + '</div>' : '') +
                                '<div style="' + volStyle + '" title="Avg Vol: ' + fmtVol(s.avg_volume) + '">Vol: ' + fmtVol(s.volume) + '</div>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                    (s.days_to_earnings >= 0 && s.days_to_earnings <= 14 ? '<div class="earnings-alert">📅 EARNINGS IN ' + s.days_to_earnings + 'D</div>' : '') +
                    (s.finviz_chart_url ? '<a href="' + (s.tradingview_url || '#') + '" target="_blank" class="chart-link"><img src="' + s.finviz_chart_url + '&t=' + Date.now() + '" class="chart-img" loading="lazy" alt="' + s.ticker + '"><div class="chart-overlay"><span>Open Live Chart</span><span>↗️</span></div></a>' : '') +
                    '<div class="metrics">' +
                        '<div class="metric"><span class="metric-label">RS Rank</span><span class="metric-value" style="color:var(--cyan);">' + s.rs + '</span></div>' +
                        '<div class="metric"><span class="metric-label">RMV</span><span class="metric-value">' + (s.rmv != null ? s.rmv.toFixed(1) : 'N/A') + '</span></div>' +
                        '<div class="metric"><span class="metric-label">1W Pct</span><span class="metric-value">' + (s.rs_1w_pct || 'N/A') + '</span></div>' +
                        '<div class="metric"><span class="metric-label">1M Pct</span><span class="metric-value">' + (s.rs_1m_pct || 'N/A') + '</span></div>' +
                    '</div>' +
                    '<div class="highlights">' + hiTags + '</div>' +
                    '<div style="display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid var(--border);padding-top:8px;">' +
                        '<span class="outlook-tag ' + outlookClass + '">' + outlookLabel + '</span>' +
                    '</div>' +
                '</div>';
            });
            document.getElementById('stock-grid').innerHTML = cardsHtml;
        }
        init();
    </script>
</body>
</html>
