<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Stock Rotation - Rajesh's Stock Screener</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- React & Recharts Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-is@18/umd/react-is.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts/umd/Recharts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg: #06060f;
            --bg2: #0d0d1a;
            --surface: rgba(255, 255, 255, .04);
            --border: rgba(255, 255, 255, .08);
            --text: #e4e4ef;
            --text2: #8888a8;
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --cyan: #00e5ff;
            --font: 'Outfit', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        html, body {
            width: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow-x: hidden;
        }

        header {
            margin-bottom: 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
            background: rgba(6, 6, 15, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }

        .logo-icon {
            font-size: 2.5rem;
            color: var(--accent2);
            margin-bottom: 4px;
            filter: drop-shadow(0 0 10px rgba(162, 155, 254, 0.3));
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text) 30%, var(--accent2));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            margin: 0.5rem 0;
        }

        .nav-link {
            color: var(--text2);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 6px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--surface);
        }

        .nav-link.active {
            color: var(--accent2);
            background: rgba(162, 155, 254, 0.1);
            border-color: rgba(162, 155, 254, 0.2);
        }

        #root {
            min-height: calc(100vh - 160px);
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.75rem; }
            .nav-links { gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
            .nav-link { font-size: 0.85rem; padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-icon">💹</div>
        <h1>Rajesh's Stock Screener</h1>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard 🚀</a>
            <a href="stages.html" class="nav-link">Sector Analysis 🏗️</a>
            <a href="industries.html" class="nav-link">Industry Momentum 📊</a>
            <a href="quick_scan.html" class="nav-link">Quick Scan ⚡</a>
            <a href="pulse.html" class="nav-link">Market Pulse 📡</a>
            <a href="tips.html" class="nav-link">Stock Tips 🎯</a>
            <a href="rotation.html" class="nav-link">Sector Rotation 🔄</a>
            <a href="stock_rotation.html" class="nav-link active">Stock Rotation 💹</a>
        </div>
    </header>

    <div id="root"></div>

    <footer style="text-align:center; padding:2rem 1rem; color:var(--text2); font-size:0.75rem; border-top:1px solid var(--border); margin-top:2rem;">
        © 2026 Rajesh's Stock Screener. All rights reserved.
    </footer>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const Lib = window.Recharts || window._Recharts;
        const { 
            ScatterChart, Scatter, XAxis, YAxis, CartesianGrid,
            Tooltip, ResponsiveContainer, Cell, ZAxis, ReferenceLine
        } = Lib;

        const Q_FILL = { leading: "#22c55e", weakening: "#f59e0b", lagging: "#ef4444", improving: "#60a5fa" };
        const Q_COLORS = { leading: "#22c55e", weakening: "#f59e0b", lagging: "#ef4444", improving: "#60a5fa" };

        function TickerBanner({ stocks }) {
            const items = [...stocks, ...stocks]; 
            return (
                <div style={{
                    background:"#040a14", borderBottom:"1px solid #1e293b", borderTop:"1px solid #1e293b",
                    overflow:"hidden", height:36, display:"flex", alignItems:"center", marginBottom:20, position:"relative",
                }}>
                    <div style={{
                        display:"flex", gap:0, animation:`ticker-scroll ${items.length * 3.5}s linear infinite`,
                        whiteSpace:"nowrap", willChange:"transform",
                    }}>
                        <style>{`
                            @keyframes ticker-scroll {
                                0%   { transform: translateX(0); }
                                100% { transform: translateX(-50%); }
                            }
                        `}</style>
                        {items.map((item, i) => (
                            <span key={i} style={{ display:"inline-flex", alignItems:"center", gap:8, paddingRight:32, fontSize:12, fontFamily:"var(--mono)"}}>
                                <span style={{ color:Q_COLORS[item.quadrant], fontWeight:700 }}>{item.ticker}</span>
                                <span style={{ color:"#f1f5f9" }}>RS {item.rs}</span>
                                <span style={{ color:"#22c55e" }}>+{item.momentum.toFixed(1)}</span>
                                <span style={{ color:"#1e293b", paddingLeft:10 }}>│</span>
                            </span>
                        ))}
                    </div>
                </div>
            );
        }

        function QuadrantList({ title, color, stocks, icon }) {
            return (
                <div style={{ background: "rgba(10, 17, 32, 0.6)", border: `1px solid ${color}33`, borderRadius: 12, padding: 16, backdropFilter: "blur(10px)" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                        <span style={{ fontSize: 18 }}>{icon}</span>
                        <span style={{ fontSize: 13, fontWeight: 700, color: "#f1f5f9", textTransform: "uppercase", letterSpacing: "0.05em" }}>{title}</span>
                        <span style={{ fontSize: 10, color: "#64748b", marginLeft: "auto" }}>Top 5</span>
                    </div>
                    {stocks.length === 0 && <div style={{ fontSize: 11, color: "#475569", textAlign: "center", py: 10 }}>No assets in quadrant</div>}
                    {stocks.map(s => (
                        <div key={s.ticker} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,0.03)" }}>
                            <div>
                                <span style={{ fontWeight: 800, fontSize: 13, color: "#fff" }}>{s.ticker}</span>
                                <div style={{ fontSize: 10, color: "#94a3b8" }}>{s.name.substring(0, 18)}</div>
                            </div>
                            <div style={{ textAlign: "right" }}>
                                <div style={{ fontSize: 12, fontWeight: 700 }}>{s.rs} RS</div>
                                <div style={{ fontSize: 10, color: s.momentum >= 0 ? "#22c55e" : "#ef4444" }}>
                                    {s.momentum > 0 ? "+" : ""}{s.momentum.toFixed(1)}
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const [resMain, resHistory] = await Promise.all([
                            fetch('web_data.json'),
                            fetch('stock_history.json')
                        ]);
                        const webData = await resMain.json();
                        const historyData = await resHistory.json();
                        
                        const MOMENTUM_LOOKBACK = 7; // 1.5 weeks (7 trading days)

                        // All stocks (AI Screened)
                        const allCandidates = webData.all_stocks || [];
                        
                        const processed = allCandidates.map(s => {
                            const h = historyData[s.ticker] || [];
                            const curRS = h[0] !== undefined ? h[0] : s.rs;
                            const prevRS = h[MOMENTUM_LOOKBACK] !== undefined ? h[MOMENTUM_LOOKBACK] : (s.rs_1w_pct || s.rs);
                            const momentum = curRS - prevRS;

                            let quadrant = "lagging";
                            if (curRS >= 85) quadrant = momentum >= 0 ? "leading" : "weakening";
                            else quadrant = momentum >= 0 ? "improving" : "lagging";

                            // Generate tail (trail)
                            const trail = h.slice(0, 8).reverse().map((rsVal, idx) => {
                                // For each point in tail, calculate its own historical momentum for Y axis
                                // This makes the "worm" rotate correctly
                                const dayInPast = 7 - idx; 
                                const histPrevRS = h[dayInPast + MOMENTUM_LOOKBACK] !== undefined ? h[dayInPast + MOMENTUM_LOOKBACK] : rsVal;
                                return {
                                    x: rsVal,
                                    y: rsVal - histPrevRS,
                                    opacity: (idx + 1) / 8
                                };
                            });

                            return { ...s, rs: curRS, momentum, quadrant, trail };
                        });

                        setData(processed);
                        setLoading(false);
                    } catch (err) {
                        console.error("Data load error:", err);
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            if (loading) return (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "60vh", gap: 20 }}>
                    <div className="logo-icon" style={{ animation: "pulse 2s infinite" }}>💹</div>
                    <div style={{ color: "var(--text2)", fontSize: "1.1rem", letterSpacing: "0.1em" }}>ANALYZING MARKET ROTATION...</div>
                    <style>{`@keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }`}</style>
                </div>
            );

            const filteredData = data.slice(0, 50);
            
            const quadrants = {
                leading: data.filter(s => s.quadrant === "leading").sort((a,b) => b.rs - a.rs).slice(0, 5),
                improving: data.filter(s => s.quadrant === "improving").sort((a,b) => b.momentum - a.momentum).slice(0, 5),
                weakening: data.filter(s => s.quadrant === "weakening").sort((a,b) => a.momentum - b.momentum).slice(0, 5),
                lagging: data.filter(s => s.quadrant === "lagging").sort((a,b) => a.rs - b.rs).slice(0, 5)
            };

            const promising = [...quadrants.leading, ...quadrants.improving].sort((a,b) => b.rs - a.rs);

            return (
                <div style={{ maxWidth: 1200, margin: "0 auto", padding: "0 1.5rem" }}>
                    <TickerBanner stocks={promising} />

                    <div style={{ marginBottom: 32 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 20 }}>
                            <div>
                                <h2 style={{ fontSize: "1.5rem", fontWeight: 700, margin: 0 }}>Market Dynamics</h2>
                                <p style={{ color: "var(--text2)", fontSize: "0.9rem", margin: "4px 0 0 0" }}>Relative Strength vs 1.5-Week Momentum</p>
                            </div>
                            <div style={{ background: "var(--surface)", padding: "8px 16px", borderRadius: 12, border: "1px solid var(--border)", fontSize: "0.8rem" }}>
                                <span style={{ color: "var(--text2)" }}>Universe: </span>
                                <span style={{ fontWeight: 600 }}>Top 50 Momentum Stocks</span>
                            </div>
                        </div>

                        {/* RRG Chart Container */}
                        <div style={{ 
                            background: "linear-gradient(180deg, rgba(16, 24, 48, 0.4) 0%, rgba(8, 12, 24, 0.4) 100%)", 
                            borderRadius: 24, 
                            border: "1px solid var(--border)", 
                            padding: "24px",
                            height: 500,
                            position: "relative",
                            boxShadow: "0 20px 50px rgba(0,0,0,0.3)"
                        }}>
                            <ResponsiveContainer width="100%" height="100%">
                                <ScatterChart margin={{ top: 20, right: 30, bottom: 40, left: 30 }}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false} />
                                    <XAxis 
                                        type="number" 
                                        dataKey="rs" 
                                        name="RS" 
                                        domain={[60, 100]} 
                                        stroke="#475569" 
                                        fontSize={11}
                                        label={{ value: "RELATIVE STRENGTH ➔", position: "bottom", offset: 20, fill: "#64748b", fontSize: 10, fontWeight: 700 }}
                                    />
                                    <YAxis 
                                        type="number" 
                                        dataKey="momentum" 
                                        name="Momentum" 
                                        domain={[-10, 10]} 
                                        stroke="#475569" 
                                        fontSize={11}
                                        label={{ value: "MOMENTUM ➔", angle: -90, position: "left", offset: 10, fill: "#64748b", fontSize: 10, fontWeight: 700 }}
                                    />
                                    <ZAxis range={[100, 500]} />
                                    <Tooltip 
                                        cursor={{ strokeDasharray: '3 3', stroke: "#334155" }}
                                        content={({ active, payload }) => {
                                            if (active && payload && payload.length) {
                                                const s = payload[0].payload;
                                                return (
                                                    <div style={{ background: "#0f172a", border: "1px solid #1e293b", padding: "12px", borderRadius: 8, boxShadow: "0 10px 25px rgba(0,0,0,0.5)" }}>
                                                        <div style={{ fontWeight: 800, fontSize: 14, color: "#fff" }}>{s.ticker}</div>
                                                        <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 6 }}>{s.name}</div>
                                                        <div style={{ display: "flex", gap: 12, fontSize: 12 }}>
                                                            <span>RS: <b>{s.rs}</b></span>
                                                            <span style={{ color: s.momentum >= 0 ? "#22c55e" : "#ef4444" }}>Mom: <b>{s.momentum.toFixed(2)}</b></span>
                                                        </div>
                                                        <div style={{ marginTop: 4, fontSize: 10, textTransform: "uppercase", color: Q_COLORS[s.quadrant], fontWeight: 700 }}>
                                                            {s.quadrant} Quadrant
                                                        </div>
                                                    </div>
                                                );
                                            }
                                            return null;
                                        }}
                                    />
                                    <ReferenceLine x={85} stroke="rgba(255,255,255,0.1)" strokeWidth={2} />
                                    <ReferenceLine y={0} stroke="rgba(255,255,255,0.1)" strokeWidth={2} />

                                    {/* Trail Paths for top 15 stocks */}
                                    {filteredData.slice(0, 15).map((s, idx) => (
                                        s.trail && s.trail.length > 1 && s.trail.map((p, pi) => pi > 0 && (
                                            <ReferenceLine 
                                                key={`t-${idx}-${pi}`} 
                                                segment={[{x: s.trail[pi-1].x, y: s.trail[pi-1].y}, {x: p.x, y: p.y}]}
                                                stroke={Q_COLORS[s.quadrant]}
                                                strokeWidth={2.5}
                                                strokeOpacity={p.opacity * 0.4}
                                            />
                                        ))
                                    ))}

                                    <Scatter name="Stocks" data={filteredData}>
                                        {filteredData.map((entry, index) => (
                                            <Cell key={`cell-${index}`} fill={Q_FILL[entry.quadrant]} stroke="rgba(255,255,255,0.1)" strokeWidth={1} />
                                        ))}
                                    </Scatter>
                                </ScatterChart>
                            </ResponsiveContainer>
                            
                            {/* Overlay Labels */}
                            <div style={{ position: "absolute", top: 40, right: 40, color: "#22c55e", fontSize: 10, fontWeight: 900, opacity: 0.4, letterSpacing: "0.3em" }}>LEADING</div>
                            <div style={{ position: "absolute", top: 40, left: 60, color: "#60a5fa", fontSize: 10, fontWeight: 900, opacity: 0.4, letterSpacing: "0.3em" }}>IMPROVING</div>
                            <div style={{ position: "absolute", bottom: 80, left: 60, color: "#ef4444", fontSize: 10, fontWeight: 900, opacity: 0.4, letterSpacing: "0.3em" }}>LAGGING</div>
                            <div style={{ position: "absolute", bottom: 80, right: 40, color: "#f59e0b", fontSize: 10, fontWeight: 900, opacity: 0.4, letterSpacing: "0.3em" }}>WEAKENING</div>
                        </div>
                    </div>

                    {/* Quadrant Detail Grid */}
                    <div style={{ 
                        display: "grid", 
                        gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", 
                        gap: 16, 
                        marginBottom: 40 
                    }}>
                        <QuadrantList title="Leading" color={Q_COLORS.leading} stocks={quadrants.leading} icon="🚀" />
                        <QuadrantList title="Improving" color={Q_COLORS.improving} stocks={quadrants.improving} icon="📈" />
                        <QuadrantList title="Weakening" color={Q_COLORS.weakening} stocks={quadrants.weakening} icon="⚠️" />
                        <QuadrantList title="Lagging" color={Q_COLORS.lagging} stocks={quadrants.lagging} icon="📉" />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
