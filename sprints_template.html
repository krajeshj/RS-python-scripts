<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
<title>Sprint Trading System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060f;--bg2:#0d0d1a;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--text:#e4e4ef;--text2:#8888a8;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00e676;--cyan:#00e5ff;--orange:#ff9100;--red:#ff5252;--glass:rgba(18,18,40,.72);--glass-b:12px;--radius:16px;--radius-sm:10px;--font:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--shadow:0 8px 32px rgba(0,0,0,.45)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(108,92,231,.15),transparent),radial-gradient(ellipse 60% 50% at 80% 110%,rgba(0,229,255,.08),transparent);padding-bottom:3rem}
.container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
header{margin-bottom:2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;position:sticky;top:0;z-index:1000;width:100%;background:rgba(6,6,15,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:1rem 0}
.nav-links{display:flex;gap:1rem;margin:0.5rem 0;flex-wrap:wrap;justify-content:center}
.nav-link{color:var(--text2);text-decoration:none;font-weight:600;font-size:0.9rem;padding:6px 14px;border-radius:20px;transition:all 0.3s ease;border:1px solid transparent}
.nav-link:hover{color:var(--text);background:var(--surface)}
.nav-link.active{color:var(--cyan);background:rgba(0,229,255,0.1);border-color:rgba(0,229,255,0.2)}
.hero{background:var(--glass);backdrop-filter:blur(var(--glass-b));border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;margin-bottom:2.5rem;box-shadow:var(--shadow);position:relative;overflow:hidden;text-align:center}
.hero h1{font-size:clamp(1.5rem, 5vw, 2.5rem);font-weight:800;background:linear-gradient(135deg,var(--text) 30%,var(--accent2));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;line-height:1.2}
.tiny-sector{font-size:0.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.characteristic{display:inline-block;font-size:0.65rem;color:var(--cyan);background:rgba(0,229,255,0.08);padding:2px 6px;border-radius:4px;border:1px solid rgba(0,229,255,0.2);margin-right:4px;margin-top:4px;font-weight:600}
.hero .subtitle{color:var(--text2);font-size:1rem;font-weight:500}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:24px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;transition:all 0.2s}
.metric:hover{border-color:var(--accent)}
.metric .val{font-size:1.25rem;font-weight:700;margin-bottom:4px;font-family:var(--mono)}
.metric .label{font-size:0.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.val.green{color:var(--green)}.val.red{color:var(--red)}.val.blue{color:var(--cyan)}.val.yellow{color:var(--orange)}
.progress-wrap{background:var(--surface);border-radius:99px;height:12px;overflow:hidden;margin:24px auto 0;border:1px solid var(--border);max-width:400px}
.progress-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--cyan));transition:width 0.8s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 15px rgba(108,92,231,0.4)}
.countdown-text{font-size:0.7rem;color:var(--text2);margin-top:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.action-banner{padding:20px 24px;border-radius:12px;margin-bottom:2.5rem;font-weight:700;font-size:1.05rem;display:flex;align-items:center;gap:15px;box-shadow:var(--shadow)}
.action-banner.enter{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:var(--green)}
.action-banner.sitout{background:rgba(255,145,0,0.1);border:1px solid rgba(255,145,0,0.3);color:var(--orange)}
.section{margin-bottom:3rem}
.section h2{font-size:1.5rem;font-weight:800;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px;color:var(--text)}
.badge{background:var(--accent);color:#fff;font-size:0.65rem;padding:3px 10px;border-radius:99px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.chart-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-top:1.5rem}
.chart-card{background:var(--glass);backdrop-filter:blur(var(--glass-b));border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.3s;box-shadow:var(--shadow);position:relative;display:flex;flex-direction:column}
.chart-card:hover{transform:translateY(-5px);border-color:var(--accent)}
.watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-size:5rem;font-weight:900;color:rgba(255,82,82,0.15);pointer-events:none;z-index:5;text-transform:uppercase;border:10px solid rgba(255,82,82,0.15);padding:10px 30px;border-radius:20px;display:none}
.chart-card.expired .watermark{display:block}
.chart-card img{width:100%;height:180px;object-fit:cover;display:block;border-bottom:1px solid var(--border);filter:brightness(0.9) contrast(1.1)}
.chart-card .info{padding:12px 20px;flex:1}
.chart-card .ticker-name{font-weight:800;color:var(--cyan);font-size:1.5rem;font-family:var(--mono)}
.chart-card .price-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.chart-card .current-price{font-size:1.1rem;font-weight:700;color:var(--text)}
.chart-card a{background:var(--surface);color:var(--text);padding:6px 12px;border-radius:8px;text-decoration:none;font-size:0.7rem;font-weight:700;transition:all 0.2s;border:1px solid var(--border)}
.chart-card a:hover{background:var(--accent);border-color:var(--accent);color:white}
.etrade-box{background:var(--bg2);padding:15px;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--border)}
.et-step{font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent2);font-weight:800;margin-top:4px}
.et-row{display:flex;justify-content:space-between;font-size:0.9rem;font-family:var(--mono)}
.et-row span{color:var(--text2);font-size:0.75rem}
.tracking-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 15px;background:rgba(0,0,0,0.2)}
.track-btn{padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-align:center}
.track-btn.active.bought{background:rgba(0,229,255,0.15);color:var(--cyan);border-color:var(--cyan)}
.track-btn.active.sold{background:rgba(255,82,82,0.15);color:var(--red);border-color:var(--red)}
.reminder{background:rgba(108,92,231,0.08);border:1px solid rgba(108,92,231,0.2);border-radius:12px;padding:20px 24px;margin-top:2rem;font-size:0.9rem;color:var(--accent2);line-height:1.6;font-weight:500}
@media (max-width:768px){.hero{padding:1.5rem}.hero h1{font-size:1.8rem}.nav-link{font-size:0.7rem;padding:5px 8px}.metrics{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
    <h1>Sprint System 🏆</h1>
    <div class="nav-links">
        <a href="index.html" class="nav-link">Dashboard 🚀</a>
        <a href="stages.html" class="nav-link">Sector Analysis 🏗️</a>
        <a href="industries.html" class="nav-link">Industry Momentum 📊</a>
        <a href="quick_scan.html" class="nav-link">Quick Scan ⚡</a>
        <a href="pulse.html" class="nav-link">Market Pulse 📡</a>
        <a href="tips.html" class="nav-link">Stock Tips 🎯</a>
        <a href="rotation.html" class="nav-link">Sector Rotation 🔄</a>
        <a href="stock_rotation.html" class="nav-link">Stock Rotation 💹</a>
        <a href="sprints.html" class="nav-link active">Sprints 🏆</a>
    </div>
</header>
<div class="container" id="app">
<div class="hero">
<h1 id="sprint-title">Sprint Trading System</h1>
<p class="subtitle" id="sprint-dates"></p>
<div class="metrics" id="metrics"></div>
<div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
<div class="countdown-text" id="countdown-text"></div>
</div>
<div id="action-area"></div>
<div class="section" id="orders-section" style="display:none">
<h2>Current Sprint Orders <span class="badge">Institutional Alpha</span></h2>
<div id="orders-charts" class="chart-row"></div>
</div>
<div class="reminder" id="reminder"></div>
</div>
<script>
const SPRINT_DATA = '__SPRINT_DATA_PLACEHOLDER__';
const d = JSON.parse(SPRINT_DATA);
render(d);

function render(d){
    const s=d.summary,c=d.current_sprint;
    const pnlClass=s.total_return_pct>=0?'green':'red';
    
    document.getElementById('sprint-dates').textContent = `Cycle: ${c.start_date} to ${c.end_date} • 15-Day Sprint`;
    
    document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="val">$${s.portfolio_start.toLocaleString()}</div><div class="label">Starting</div></div>
    <div class="metric"><div class="val blue">$${s.portfolio_current.toLocaleString()}</div><div class="label">Balance</div></div>
    <div class="metric"><div class="val yellow">$${s.portfolio_target.toLocaleString()}</div><div class="label">3x Target</div></div>
    <div class="metric"><div class="val">${s.win_rate}%</div><div class="label">Win Rate</div></div>
    <div class="metric"><div class="val ${pnlClass}">${s.total_return_pct>0?'+':''}${s.total_return_pct}%</div><div class="label">Return</div></div>`;
    
    const remaining = c.days_remaining || 15;
    const progress = ((15 - remaining) / 15) * 100;
    document.getElementById('progress').style.width = Math.max(5, progress) + '%';
    document.getElementById('countdown-text').textContent = `${remaining} Days Remaining in Sprint`;

    const aa=document.getElementById('action-area');
    if(c.market==='UNFAVORABLE'){
        aa.innerHTML=`<div class="action-banner sitout">⚠️ SIT OUT — Market Unfavorable (SPY 21 EMA $${c.ema21} < 50 SMA $${c.sma50}). Protect Capital.</div>`;
    } else {
        aa.innerHTML=`<div class="action-banner enter">✅ ACTIVE SPRINT — Market Favorable (SPY 21 EMA $${c.ema21} > 50 SMA $${c.sma50}). Follow OCO Rules.</div>`;
        renderOrders(c.orders, c.start_date);
    }
    document.getElementById('reminder').innerHTML=`<strong>Next Review:</strong> ${s.next_sprint_reminder}<br><small style="opacity:0.6">Updated: ${d.generated}</small>`;
}

function renderOrders(orders, startDate){
    const section = document.getElementById('orders-section');
    section.style.display = 'block';
    
    document.getElementById('orders-charts').innerHTML = orders.map(o => {
        const isExpired = o.price < o.buy_stop * 0.99; // Expired if it dips too far before entry
        const cardClass = isExpired ? 'chart-card expired' : 'chart-card';
        const storageKey = `sprint_${startDate}_${o.ticker}`;
        const state = JSON.parse(localStorage.getItem(storageKey) || '{"bought":false,"sold":false}');
        
        return `
        <div class="${cardClass}" id="card-${o.ticker}">
            <div class="watermark">SELL</div>
            <img src="https://finviz.com/chart.ashx?t=${o.ticker}&ty=c&ta=1&p=d&s=l" alt="${o.ticker}" loading="lazy">
            <div class="info">
                <div class="price-row">
                    <div class="ticker-name">${o.ticker}</div>
                    <div class="current-price">$${o.price.toFixed(2)}</div>
                </div>
                <div class="tiny-sector">${o.sector}</div>
                <div class="highlights" style="margin-top:8px">${o.highlights.split('•').map(h=>`<span class="characteristic">${h.trim()}</span>`).join('')}</div>
                <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center">
                    <a href="https://www.tradingview.com/chart/?symbol=${o.ticker}" target="_blank">TradingView</a>
                    <div style="font-size:0.6rem; color:var(--text2); font-weight:600">3.5R Target</div>
                </div>
            </div>
            <div class="etrade-box">
                <div class="et-step">Primary: Buy Stop-Limit</div>
                <div class="et-row"><span>Trigger:</span> <strong>$${o.buy_stop.toFixed(2)}</strong></div>
                <div class="et-row"><span>Limit:</span> <strong>$${o.buy_limit.toFixed(2)}</strong></div>
                <div class="et-step">Secondary: OCO Target</div>
                <div class="et-row"><span>Profit:</span> <strong class="win">$${o.target.toFixed(2)}</strong></div>
                <div class="et-step">Secondary: OCO Stop</div>
                <div class="et-row"><span>Loss:</span> <strong class="loss">$${o.stop.toFixed(2)}</strong></div>
            </div>
            <div class="tracking-btns">
                <div class="track-btn bought ${state.bought?'active':''}" onclick="toggleTrack('${o.ticker}', 'bought', '${startDate}')">Bought</div>
                <div class="track-btn sold ${state.sold?'active':''}" onclick="toggleTrack('${o.ticker}', 'sold', '${startDate}')">Sold</div>
            </div>
        </div>`;
    }).join('');
}

function toggleTrack(ticker, type, startDate) {
    const storageKey = `sprint_${startDate}_${ticker}`;
    const state = JSON.parse(localStorage.getItem(storageKey) || '{"bought":false,"sold":false}');
    state[type] = !state[type];
    localStorage.setItem(storageKey, JSON.stringify(state));
    
    // Refresh UI for the specific card
    const btn = document.querySelector(`#card-${ticker} .track-btn.${type}`);
    btn.classList.toggle('active');
}
</script>
</body>
</html>
