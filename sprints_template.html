<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
<title>Sprint Trading System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060f;--bg2:#0d0d1a;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--text:#e4e4ef;--text2:#8888a8;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00e676;--cyan:#00e5ff;--orange:#ff9100;--red:#ff5252;--glass:rgba(18,18,40,.72);--glass-b:12px;--radius:16px;--radius-sm:10px;--font:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--shadow:0 8px 32px rgba(0,0,0,.45)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(108,92,231,.15),transparent),radial-gradient(ellipse 60% 50% at 80% 110%,rgba(0,229,255,.08),transparent);padding-bottom:3rem}
.container{max-width:1400px;margin:0 auto;padding:2rem 1.5rem}
header{margin-bottom:2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;position:sticky;top:0;z-index:1000;width:100%;background:rgba(6,6,15,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:1rem 0}
.nav-links{display:flex;gap:1rem;margin:0.5rem 0;flex-wrap:wrap;justify-content:center}
.nav-link{color:var(--text2);text-decoration:none;font-weight:600;font-size:0.9rem;padding:6px 14px;border-radius:20px;transition:all 0.3s ease;border:1px solid transparent}
.nav-link:hover{color:var(--text);background:var(--surface)}
.nav-link.active{color:var(--cyan);background:rgba(0,229,255,0.1);border-color:rgba(0,229,255,0.2)}
.hero{background:var(--glass);backdrop-filter:blur(var(--glass-b));border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;margin-bottom:2.5rem;box-shadow:var(--shadow);position:relative;overflow:hidden;text-align:center}
.hero h1{font-size:clamp(1.5rem, 5vw, 2.5rem);font-weight:800;background:linear-gradient(135deg,var(--text) 30%,var(--accent2));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;line-height:1.2}
.hero .subtitle{color:var(--text2);font-size:1rem;font-weight:500}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:24px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;transition:all 0.2s}
.metric:hover{border-color:var(--accent)}
.metric .val{font-size:1.25rem;font-weight:700;margin-bottom:4px;font-family:var(--mono)}
.metric .label{font-size:0.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.val.green{color:var(--green)}.val.red{color:var(--red)}.val.blue{color:var(--cyan)}.val.yellow{color:var(--orange)}
.progress-wrap{background:var(--surface);border-radius:99px;height:12px;overflow:hidden;margin:24px auto 0;border:1px solid var(--border);max-width:400px}
.countdown-text{font-size:0.7rem;color:var(--text2);margin-top:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.action-banner{padding:20px 24px;border-radius:12px;margin-bottom:2.5rem;font-weight:700;font-size:1.05rem;display:flex;align-items:center;gap:15px;box-shadow:var(--shadow)}
.action-banner.enter{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:var(--green)}
.action-banner.sitout{background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.3);color:var(--red);text-transform:uppercase;letter-spacing:1px}
.section{margin-bottom:3rem}
.section h2{font-size:1.5rem;font-weight:800;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px;color:var(--text)}
.badge{background:var(--accent);color:#fff;font-size:0.65rem;padding:3px 10px;border-radius:99px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.chart-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;margin-top:1.5rem}
.chart-card{background:var(--glass);backdrop-filter:blur(var(--glass-b));border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.3s;box-shadow:var(--shadow);position:relative;display:flex;flex-direction:column;min-width:0}
.chart-card:hover{border-color:var(--accent);transform:translateY(-3px)}
.watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-size:5rem;font-weight:900;color:rgba(255,82,82,0.1);pointer-events:none;z-index:5;text-transform:uppercase;border:10px solid rgba(255,82,82,0.1);padding:10px 30px;border-radius:20px;display:none}
.chart-card.expired .watermark{display:block}
.chart-card img{width:100%;height:auto;aspect-ratio:1.9 / 1;object-fit:contain;background:#000;display:block;border-bottom:1px solid var(--border);filter:brightness(1.0) contrast(1.1)}
.chart-card .info{padding:12px 18px;flex:1}
.chart-card .ticker-name{font-weight:800;color:var(--cyan);font-size:1.6rem;font-family:var(--mono);line-height:1.1}
.chart-card .price-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.chart-card .current-price{font-size:1.2rem;font-weight:700;color:var(--text)}
.characteristic{display:inline-block;font-size:0.6rem;color:var(--cyan);background:rgba(0,229,255,0.08);padding:2px 6px;border-radius:4px;border:1px solid rgba(0,229,255,0.2);margin-right:4px;margin-top:4px;font-weight:600}
.canslim-tray{display:flex;gap:3px;margin-top:6px}
.canslim-letter{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:800;border-radius:3px;background:rgba(255,255,255,0.05);color:var(--text2);border:1px solid var(--border)}
.canslim-letter.active{background:var(--green);color:var(--bg);border-color:var(--green);box-shadow:0 0 8px rgba(0,230,118,0.2)}
.canslim-letter.inactive-m{background:rgba(255,82,82,0.15);color:var(--red);border-color:rgba(255,82,82,0.3)}
.metrics-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:var(--surface);padding:8px;border-radius:8px;margin-top:10px}
.metric-mini{display:flex;flex-direction:column;gap:1px}
.metric-mini .label{font-size:0.55rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;font-weight:700}
.metric-mini .val{font-size:0.9rem;font-weight:700;color:var(--text);font-family:var(--mono)}
.outlook-tag{padding:3px 8px;border-radius:6px;font-size:0.65rem;font-weight:700;border:1px solid;display:inline-block;margin-top:8px}
.outlook-rallying{background:rgba(0,230,118,0.1);color:#00e676;border-color:rgba(0,230,118,0.2)}
.outlook-curling{background:rgba(255,145,0,0.1);color:#ff9100;border-color:rgba(255,145,0,0.2)}
.outlook-declining{background:rgba(255,82,82,0.1);color:#ff5252;border-color:rgba(255,82,82,0.2)}
.meta-info{font-size:0.7rem;color:var(--text2);font-weight:500;margin-top:2px}
.badge-mini{font-size:0.6rem;padding:2px 6px;border-radius:4px;font-weight:700;text-transform:uppercase}
.etrade-box{background:var(--bg2);padding:15px;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--border)}
.et-step{font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent2);font-weight:800;margin-top:4px;border-bottom:1px solid rgba(162,155,254,0.1);padding-bottom:3px}
.et-row{display:flex;justify-content:space-between;font-size:0.9rem;font-family:var(--mono);margin-top:2px}
.et-row span{color:var(--text2);font-size:0.7rem}
.tracking-btns{display:flex;align-items:center;gap:10px;padding:12px 18px;background:rgba(0,0,0,0.2);border-top:1px solid var(--border)}
.track-group{display:flex;gap:6px}
.track-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;transition:all 0.2s}
.track-btn.active.bought{background:rgba(0,230,118,0.2);color:var(--green);border-color:var(--green)}
.track-btn.active.sold{background:rgba(255,82,82,0.2);color:var(--red);border-color:var(--red)}
.card-table{background:var(--glass);backdrop-filter:blur(var(--glass-b));border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-top:1.5rem}
table{width:100%;border-collapse:collapse;font-size:0.9rem}
th{background:rgba(255,255,255,0.03);padding:12px 15px;text-align:left;font-weight:700;font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text2);border-bottom:1px solid var(--border)}
td{padding:12px 15px;border-bottom:1px solid var(--border);font-family:var(--mono);font-weight:500}
tr:hover td{background:rgba(255,255,255,0.02)}
.ticker-cell{font-weight:800;color:var(--cyan)}
.win{color:var(--green)}.loss{color:var(--red)}
.bt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:1.5rem}
.bt-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all 0.3s}
.bt-card:hover{border-color:var(--accent);transform:translateY(-3px)}
.bt-card.satout{opacity:0.6;border-style:dashed}
.bt-card .sprint-num{font-size:0.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:800}
.bt-card .date{font-size:0.9rem;font-weight:700;margin-bottom:12px;color:var(--text)}
.bt-card .pnl{font-size:1.4rem;font-weight:800;margin-bottom:8px;font-family:var(--mono)}
.bt-tickers{font-size:0.65rem;color:var(--cyan);font-family:var(--mono);margin-top:8px;opacity:0.8}
.reminder{background:rgba(108,92,231,0.08);border:1px solid rgba(108,92,231,0.2);border-radius:12px;padding:20px 25px;margin-top:2rem;font-size:0.9rem;color:var(--accent2);line-height:1.6;font-weight:500}
@media (max-width:768px){.container{padding:1rem}.hero{padding:1.5rem}.hero h1{font-size:1.8rem}.nav-link{font-size:0.7rem;padding:5px 8px}.metrics{grid-template-columns:repeat(2,1fr)}.chart-row{grid-template-columns:1fr}}

</style>
</head>
<body>
<header>
    <h1>Sprint System 🏆</h1>
    <div class="nav-links">
        <a href="index.html" class="nav-link">Dashboard 🚀</a>
        <a href="stages.html" class="nav-link">Sector Analysis 🏗️</a>
        <a href="industries.html" class="nav-link">Industry Momentum 📊</a>
        <a href="quick_scan.html" class="nav-link">Quick Scan ⚡</a>
        <a href="pulse.html" class="nav-link">Market Pulse 📡</a>
        <a href="tips.html" class="nav-link">Stock Tips 🎯</a>
        <a href="rotation.html" class="nav-link">Sector Rotation 🔄</a>
        <a href="stock_rotation.html" class="nav-link">Stock Rotation 💹</a>
        <a href="sprints.html" class="nav-link active">Sprints 🏆</a>
    </div>
</header>
<div class="container" id="app">
<div class="hero">
<h1 id="sprint-title">Sprint Trading System</h1>
<p class="subtitle" id="sprint-dates"></p>
<div class="metrics" id="metrics"></div>
<div class="progress-wrap"><div class="progress-bar" id="progress" style="height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--cyan));transition:width 0.8s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 15px rgba(108,92,231,0.4)"></div></div>
<div class="countdown-text" id="countdown-text"></div>
</div>
<div id="action-area"></div>
<div class="section" id="orders-section" style="display:none">
<h2>Power E*TRADE OTOCO <span class="badge">Institutional Alpha</span></h2>
<div id="orders-charts" class="chart-row"></div>
<div id="orders-table-container" class="card-table" style="margin-top:2rem"></div>
</div>
<div class="section" id="log-section">
<h2>Active Trade Log <span class="badge" title="Click 'BUY' on any card to record a trade">Journal (Click BUY to log)</span></h2>
<div id="trade-log-container" class="card-table"></div>
</div>
<div class="section">
<h2>Sprint History <span class="badge" id="bt-count"></span></h2>
<div class="bt-grid" id="bt-grid"></div>
</div>
<div class="reminder" id="reminder"></div>
</div>
<script>
const SPRINT_DATA = '__SPRINT_DATA_PLACEHOLDER__';
let currentData = null;

try {
    currentData = JSON.parse(SPRINT_DATA);
    render(currentData);
} catch (e) {
    console.error("Sprint Data Parse Error:", e);
}

function render(d){
    const s=d.summary,c=d.current_sprint,bt=d.backtests;
    const pnlClass=s.total_return_pct>=0?'green':'red';
    document.getElementById('sprint-dates').textContent = `Cycle: ${c.start_date} to ${c.end_date} • 15-Day Sprint`;
    document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="val">$${s.portfolio_start.toLocaleString()}</div><div class="label">Starting</div></div>
    <div class="metric"><div class="val blue">$${s.portfolio_current.toLocaleString()}</div><div class="label">Balance</div></div>
    <div class="metric"><div class="val yellow">$${s.portfolio_target.toLocaleString()}</div><div class="label">3x Target</div></div>
    <div class="metric"><div class="val">${s.win_rate}%</div><div class="label">Win Rate</div></div>
    <div class="metric"><div class="val ${pnlClass}">${s.total_return_pct>0?'+':''}${s.total_return_pct}%</div><div class="label">Return</div></div>
    <div class="metric"><div class="val blue">${s.sharpe_ratio || '0.00'}</div><div class="label">Sharpe Ratio</div></div>`;
    
    const remaining = c.days_remaining || 15;
    const progress = ((15 - remaining) / 15) * 100;
    document.getElementById('progress').style.width = Math.max(5, progress) + '%';
    document.getElementById('countdown-text').textContent = `${remaining} Days Remaining in Sprint`;

    const aa=document.getElementById('action-area');
    if(c.market==='UNFAVORABLE'){
        aa.innerHTML=`<div class="action-banner sitout">🛑 SHIELD ACTIVE — SIT OUT OF THE MARKET (SPY EMA21 $${c.ema21} < SMA50 $${c.sma50}). NO TRADES.</div>`;
    } else {
        aa.innerHTML=`<div class="action-banner enter">✅ MARKET FAVORABLE — SPRINT ACTIVE (SPY EMA21 $${c.ema21} > SMA50 $${c.sma50}). EXECUTE OCO.</div>`;
        renderOrders(c.orders, c.start_date);
    }
    
    document.getElementById('bt-count').textContent = bt.length + ' Sprints';
    document.getElementById('bt-grid').innerHTML = bt.map(b => {
        const isSat = b.action === 'SAT OUT';
        const cls = isSat ? 'bt-card satout' : 'bt-card';
        const pnlC = b.pnl > 0 ? 'win' : b.pnl < 0 ? 'loss' : '';
        return `
        <div class="${cls}">
            <div class="sprint-num">Sprint ${b.sprint}</div>
            <div class="date">${b.date}</div>
            ${isSat ? `<div class="pnl" style="color:var(--red)">SAT OUT</div><div class="detail">Market Shield Protected Capital</div>`
                    : `<div class="pnl ${pnlC}">${b.pnl > 0 ? '+' : ''}$${b.pnl.toLocaleString()}</div>
                       <div class="detail">W:${b.wins} L:${b.losses}</div>
                       <div class="bt-tickers">${(b.tickers || []).join(', ')}</div>`}
        </div>`;
    }).join('');
    
    document.getElementById('reminder').innerHTML=`<strong>Strategy Guide:</strong> ${s.next_sprint_reminder}<br><small style="opacity:0.6">Updated: ${d.generated}</small>`;
    renderTradeLog();
}

function getOCO(price) {
    const stopDist = price * 0.03;
    const stop = price - stopDist;
    const target = price + (stopDist * 3.5);
    return {
        buy_stop: price,
        buy_limit: price * 1.002,
        target: target,
        stop: stop,
        stop_limit: stop * 0.998
    };
}

function createCanslimTray(canslim) {
    if (!canslim) return '';
    const letters = ['C', 'A', 'N', 'S', 'L', 'I', 'M'];
    return `<div class="canslim-tray">
        ${letters.map(l => {
        const active = canslim[l.toLowerCase()];
        let extraClass = active ? 'active' : '';
        if (l === 'M' && !active) { extraClass = 'inactive-m'; }
        return `<div class="canslim-letter ${extraClass}" title="${l}">${l}</div>`;
    }).join('')}
    </div>`;
}

function fmtVol(v) {
    if (!v) return 'N/A';
    if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
    if (v >= 1000) return (v / 1000).toFixed(0) + 'K';
    return v.toString();
}

function renderOrders(orders, startDate){
    document.getElementById('orders-section').style.display = 'block';
    document.getElementById('orders-charts').innerHTML = orders.map(o => {
        const storageKey = `sprint_${startDate}_${o.ticker}`;
        const state = JSON.parse(localStorage.getItem(storageKey) || '{"bought":false,"sold":false}');
        const oco = getOCO(o.today_price);
        const referenceOco = getOCO(o.price);
        const isSell = state.bought && (o.today_price < referenceOco.stop_limit);
        
        const outlookClass = o.momentum_notes.includes('Rallying') || o.momentum_notes.includes('Recovering') ? 'outlook-rallying' :
                           o.momentum_notes.includes('Curling') ? 'outlook-curling' : 'outlook-declining';

        let volStyle = "font-size: 0.6rem; color: var(--text2); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); display: inline-block;";
        if (o.volume > o.avg_volume) {
            volStyle = o.is_up ? "font-size: 0.6rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(0,230,118,0.3); background: rgba(0,230,118,0.1); color: var(--green); display: inline-block;"
                              : "font-size: 0.6rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255,145,0,0.3); background: rgba(255,145,0,0.1); color: var(--orange); display: inline-block;";
        }

        return `
        <div class="chart-card ${isSell ? 'expired' : ''}" id="card-${o.ticker}">
            <div class="watermark" id="watermark-${o.ticker}" style="display: ${isSell ? 'block' : 'none'}">SELL</div>
            <img src="https://finviz.com/chart.ashx?t=${o.ticker}&ty=c&ta=1&p=d&s=l" alt="${o.ticker}">
            <div class="info">
                <div class="price-row">
                    <div>
                        <div class="ticker-name">${o.ticker}</div>
                        <div class="meta-info">${o.industry} • ${o.sector_symbol}</div>
                        ${createCanslimTray(o.canslim)}
                    </div>
                    <div style="text-align:right">
                        <div class="current-price" id="price-display-${o.ticker}">$${o.today_price.toFixed(2)}</div>
                        <div style="margin-top:4px; display:flex; flex-direction:column; align-items:flex-end; gap:3px;">
                            <div style="${volStyle}" title="Avg Vol: ${fmtVol(o.avg_volume)}">Vol: ${fmtVol(o.volume)}</div>
                            <div style="font-size:0.6rem; color:var(--text2); font-weight:600">Pick: $${o.price.toFixed(2)}</div>
                        </div>
                    </div>
                </div>

                <div class="metrics-mini">
                    <div class="metric-mini"><span class="label">RS</span><span class="val" style="color:var(--cyan)">${o.rs}</span></div>
                    <div class="metric-mini"><span class="label">RMV</span><span class="val">${o.rmv}</span></div>
                    <div class="metric-mini"><span class="label">QUAD</span><span class="val" style="font-size:0.7rem">${o.industry_quadrant.toUpperCase()}</span></div>
                    <div class="metric-mini"><span class="label">SHRS</span><span class="val">${o.shares}</span></div>
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px">
                    <span class="outlook-tag ${outlookClass}">${o.momentum_notes}</span>
                    <div style="font-size:0.65rem; color:var(--red); font-weight:700">Risk: $${o.risk.toFixed(0)}</div>
                </div>

                <div class="highlights" style="margin-top:10px">
                    ${o.highlights.split('•').map(h=>`<span class="characteristic">${h.trim()}</span>`).join('')}
                </div>

                <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:8px">
                    <label style="font-size:0.55rem; color:var(--text2); display:block; margin-bottom:2px; text-transform:uppercase; letter-spacing:1px">Price Override</label>
                    <input type="number" step="0.01" value="${o.today_price}" 
                           oninput="updateLivePrice('${o.ticker}', this.value)"
                           style="background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:2px 6px; font-size:0.75rem; width:100%; font-family:var(--mono); box-sizing:border-box">
                </div>
            </div>

            <div class="etrade-box" id="oco-box-${o.ticker}">
                <div class="et-step">1: Buy Stop-Limit</div>
                <div class="et-row"><span>Stop:</span> <strong id="part1-stop-${o.ticker}">$${oco.buy_stop.toFixed(2)}</strong> <span>Limit:</span> <strong id="part1-limit-${o.ticker}">$${oco.buy_limit.toFixed(2)}</strong></div>
                
                <div class="et-step">2: Profit Target</div>
                <div class="et-row"><span>Limit:</span> <strong class="win" id="part2-limit-${o.ticker}">$${oco.target.toFixed(2)}</strong></div>
                
                <div class="et-step">3: Stop Loss</div>
                <div class="et-row"><span>Stop:</span> <strong class="loss" id="part3-stop-${o.ticker}">$${oco.stop.toFixed(2)}</strong> <span>Limit:</span> <strong class="loss" id="part3-limit-${o.ticker}">$${oco.stop_limit.toFixed(2)}</strong></div>
            </div>

            <div class="tracking-btns">
                <div class="track-group">
                    <div class="track-btn bought ${state.bought?'active':''}" onclick="toggleTrack('${o.ticker}', 'bought', '${startDate}', ${o.today_price})">${state.bought ? 'OWNED' : 'BUY'}</div>
                    <div class="track-btn sold ${state.sold?'active':''}" onclick="toggleTrack('${o.ticker}', 'sold', '${startDate}')">SELL</div>
                </div>
                <div style="flex:1; text-align:right">
                    <a href="https://www.tradingview.com/chart/?symbol=${o.ticker}" target="_blank" style="font-size:0.6rem; color:var(--cyan); text-decoration:none; font-weight:700">CHART ↗</a>
                </div>
            </div>
        </div>`;
    }).join('');
    
    document.getElementById('orders-table-container').innerHTML = `
    <table>
        <tr><th>Ticker</th><th>Shrs</th><th>Buy Stop</th><th>Target</th><th>Stop</th></tr>
        ${orders.map(o => `
        <tr>
            <td class="ticker-cell">${o.ticker}</td>
            <td>${o.shares}</td>
            <td>$${o.buy_stop.toFixed(2)}</td>
            <td class="win">$${o.target.toFixed(2)}</td>
            <td class="loss">$${o.stop.toFixed(2)}</td>
        </tr>`).join('')}
    </table>`;
}


function toggleTrack(ticker, type, startDate, currentPrice = 0) {
    const storageKey = `sprint_${startDate}_${ticker}`;
    const state = JSON.parse(localStorage.getItem(storageKey) || '{"bought":false,"sold":false,"price":0,"date":""}');
    state[type] = !state[type];
    
    if (type === 'bought' && state.bought) {
        state.price = currentPrice || state.price;
        state.date = new Date().toISOString().split('T')[0];
    } else if (type === 'sold' && state.sold) {
        state.sell_date = new Date().toISOString().split('T')[0];
    }
    
    localStorage.setItem(storageKey, JSON.stringify(state));
    renderOrders(currentData.current_sprint.orders, startDate);
    renderTradeLog();
}

function renderTradeLog() {
    const orders = currentData.current_sprint.orders;
    const startDate = currentData.current_sprint.start_date;
    let logHtml = `<table><tr><th>Ticker</th><th>Entry Date</th><th>Entry Price</th><th>Shares</th><th>Current PnL</th><th>Status</th></tr>`;
    
    let activeAny = false;
    orders.forEach(o => {
        const state = JSON.parse(localStorage.getItem(`sprint_${startDate}_${o.ticker}`) || 'null');
        if (state && state.bought) {
            activeAny = true;
            const pnl = (o.today_price - state.price) * o.shares;
            const pnlClass = pnl >= 0 ? 'win' : 'loss';
            logHtml += `<tr>
                <td class="ticker-cell">${o.ticker}</td>
                <td>${state.date}</td>
                <td>$${state.price.toFixed(2)}</td>
                <td>${o.shares}</td>
                <td class="${pnlClass}">$${pnl.toFixed(2)}</td>
                <td>${state.sold ? '<span class="loss">CLOSED</span>' : '<span class="win">OPEN</span>'}</td>
            </tr>`;
        }
    });
    
    if (!activeAny) {
        logHtml += `<tr><td colspan="6" style="text-align:center; color:var(--text2); padding:2rem">No active trades recorded in browser storage.</td></tr>`;
    }
    
    logHtml += `</table>`;
    document.getElementById('trade-log-container').innerHTML = logHtml;
}

function updateLivePrice(ticker, val) {
    const price = parseFloat(val);
    if (isNaN(price)) return;
    
    // 1. Update the local data
    const o = currentData.current_sprint.orders.find(ord => ord.ticker === ticker);
    if (!o) return;
    o.today_price = price;

    // 2. Recalculate OCOs
    const newOco = getOCO(price);
    const refOco = getOCO(o.price);

    // 3. Check Watermark State
    const storageKey = `sprint_${currentData.current_sprint.start_date}_${ticker}`;
    const state = JSON.parse(localStorage.getItem(storageKey) || '{"bought":false,"sold":false}');
    const isSell = state.bought && (price < refOco.stop_limit);

    // 4. Update UI Surgically (No re-render of the whole card)
    document.getElementById(`price-display-${ticker}`).textContent = `$${price.toFixed(2)}`;
    document.getElementById(`part1-stop-${ticker}`).textContent = `$${newOco.buy_stop.toFixed(2)}`;
    document.getElementById(`part1-limit-${ticker}`).textContent = `$${newOco.buy_limit.toFixed(2)}`;
    document.getElementById(`part2-limit-${ticker}`).textContent = `$${newOco.target.toFixed(2)}`;
    document.getElementById(`part3-stop-${ticker}`).textContent = `$${newOco.stop.toFixed(2)}`;
    document.getElementById(`part3-limit-${ticker}`).textContent = `$${newOco.stop_limit.toFixed(2)}`;
    
    const wm = document.getElementById(`watermark-${ticker}`);
    wm.style.display = isSell ? 'block' : 'none';
    
    const card = document.getElementById(`card-${ticker}`);
    if (isSell) card.classList.add('expired');
    else card.classList.remove('expired');
}
</script>
</body>
</html>
