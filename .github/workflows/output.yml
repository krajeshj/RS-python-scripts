name: Output
on:
  push:
    branches: [ master ]
  schedule:
    - cron: "13 21 * * 1-5"
  workflow_dispatch:

jobs:
  quick-scan:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: checkout repo content
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: fetch data and run quick ranking only
        run: |
          python -m pip install -r requirements.txt
          python -c "import rs_data; rs_data.main(False, None, True)"
          python rs_ranking.py --quick

      - name: commit and push results
        run: |
          git config user.name "GitHub Actions" && git config user.email "actions@github.com"
          git add output/quick_web_data.json output/rs_stocks_quick.csv output/rs_industries_quick.csv
          git commit -m "Quick scan update - $(date)" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output

  full-scan:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: checkout repo content
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with: 
          python-version: "3.11"
          cache: 'pip'

      - name: execute py script
        run: |
          python -m pip install -r requirements.txt
          python relative-strength.py true false true

      - name: commit and push results
        run: |
          git config user.name "GitHub Actions" && git config user.email "actions@github.com"
          git add output/*
          git commit -m "Update analysis results - $(date)" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
